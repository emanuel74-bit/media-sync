version: "1.1"

system:
  name: "class-role-classifier"
  purpose: >
    Determine the correct architectural role and file suffix for a class or
    artifact based on responsibilities, behavior, side effects, and constraints.
  philosophy:
    - "Every class has exactly one role"
    - "Roles are defined by responsibility, not naming"
    - "If multiple roles apply, decomposition is required"
    - "If unclear, fail closed"
    - "Behavior defines placement, not intention"
  enforcement:
    mode: "strict"
    ambiguity_policy: "fail_closed"
    multi_role_policy: "reject_and_decompose"
    exclusivity: "exactly_one_role_required"
    fallback_allowed: true
    fallback_requires_explicit_justification: true
  orchestration:
    controlled_by: "conventions.orchestrator.yaml"
    requires:
      - "stable_intent"
      - "abstract_artifact"
    produces:
      - "role"
      - "suffix"
    forbidden:
      - "role_before_intent"
      - "changing_architecture_layer_policy"
      - "changing_folder_structure"
      - "selecting_design_pattern"

input:
  artifact_description:
    responsibilities: []
    has_side_effects: "boolean"
    mutates_state: "boolean"
    depends_on_external_systems: "boolean"
    contains_business_rules: "boolean"
    is_pure_functional: "boolean"
    is_composable: "boolean"
    context_based: "boolean"
    transforms_interfaces: "boolean"
    output_formatting: "boolean"
    is_immutable: "boolean"
    transport_related: "boolean"
    step_by_step_construction: "boolean"
    dynamic_resolution: "boolean"
    interchangeable_algorithms: "boolean"
    represents_error: "boolean"
    type_only: "boolean"
    finite_set: "boolean"
    scope: "single_action | multi_step | utility | structural | data | decision | configuration | constants"
    input_output_shape: "none | transforms | validates | constructs"
    interacts_with:
      - "http"
      - "websocket"
      - "database"
      - "external_api"
      - "event_system"
      - "none"

layer_mapping_guidance:
  controller: "entry"
  gateway: "entry"
  use_case: "application"
  service: "application"
  orchestrator: "application"
  policy: "decision"
  specification: "decision"
  selector: "decision"
  guard: "decision"
  domain: "domain"
  event: "domain"
  repository: "infrastructure"
  client: "infrastructure"
  adapter: "infrastructure"
  listener: "infrastructure"
  publisher: "infrastructure"
  mapper: "support"
  normalizer: "support"
  formatter: "support"
  factory: "support"
  builder: "support"
  validator: "support"
  resolver: "support"
  strategy: "support"
  module: "support"
  dto: "support"
  schema: "support"
  config: "support"
  error: "support"
  types: "support"
  constants: "support"
  enum: "support"
  util: "support"

role_disambiguation:
  strategy_role_vs_strategy_pattern:
    role_meaning: "A file role for interchangeable behavior implementations."
    pattern_meaning: "A behavioral design pattern for selecting interchangeable algorithms."
    rule:
      - "Role defines file classification and suffix."
      - "Pattern defines internal implementation or collaboration."
      - "A strategy role may implement the Strategy pattern, but they are not automatically identical."
  factory_role_vs_factory_method_pattern:
    role_meaning: "A file role responsible for object construction."
    pattern_meaning: "A creational pattern where subclasses or contexts decide object type."
  adapter_role_vs_adapter_pattern:
    role_meaning: "A file role that bridges incompatible interfaces."
    pattern_meaning: "A structural pattern for adapting one interface to another."

evaluation_order:
  - "detect_transport_layer"
  - "detect_execution_layer"
  - "detect_decision_layer"
  - "detect_transformation_layer"
  - "detect_domain_layer"
  - "detect_data_layer"
  - "detect_integration_layer"
  - "detect_construction_layer"
  - "detect_validation_layer"
  - "detect_resolution_layer"
  - "detect_structure_layer"
  - "detect_config_layer"
  - "detect_error_layer"
  - "detect_type_layer"
  - "detect_constants_layer"
  - "fallback"

roles:
  controller:
    suffix: ".controller.ts"
    layer_hint: "entry"
    match:
      interacts_with: ["http"]
    rules:
      - "handles incoming requests"
      - "delegates logic outward"
    forbidden:
      - "contains_business_rules"
      - "has_side_effects"
    output: "controller"

  gateway:
    suffix: ".gateway.ts"
    layer_hint: "entry"
    match:
      interacts_with: ["websocket"]
    rules:
      - "manages connections"
      - "handles real-time messaging"
    forbidden:
      - "contains_business_rules"
    output: "gateway"

  use_case:
    suffix: ".use-case.ts"
    layer_hint: "application"
    match:
      scope: "single_action"
      contains_business_rules: true
    rules:
      - "one input -> one outcome"
      - "encapsulates full action"
    output: "use_case"

  service:
    suffix: ".service.ts"
    layer_hint: "application"
    match:
      has_side_effects: true
      scope: "multi_step"
    rules:
      - "coordinates dependencies"
      - "owns side effects"
      - "orchestrates workflows"
    forbidden:
      - "direct_database_access"
      - "raw_persistence_model_leakage"
    output: "service"

  orchestrator:
    suffix: ".orchestrator.ts"
    layer_hint: "application"
    match:
      scope: "multi_step"
      contains_business_rules: false
    rules:
      - "controls execution flow"
      - "coordinates steps without owning business rules"
    forbidden:
      - "contains_business_rules"
    output: "orchestrator"

  policy:
    suffix: ".policy.ts"
    layer_hint: "decision"
    match:
      contains_business_rules: true
      mutates_state: false
      has_side_effects: false
    rules:
      - "returns decision"
      - "pure decision logic"
    output: "policy"

  specification:
    suffix: ".specification.ts"
    layer_hint: "decision"
    match:
      contains_business_rules: true
      is_composable: true
    rules:
      - "composable logic"
      - "expresses testable business condition"
    output: "specification"

  selector:
    suffix: ".selector.ts"
    layer_hint: "decision"
    match:
      scope: "decision"
    rules:
      - "chooses one option"
      - "does not execute chosen option"
    output: "selector"

  guard:
    suffix: ".guard.ts"
    layer_hint: "decision"
    match:
      scope: "decision"
      context_based: true
    rules:
      - "authorization or access decision"
    output: "guard"

  mapper:
    suffix: ".mapper.ts"
    layer_hint: "support"
    match:
      input_output_shape: "transforms"
      is_pure_functional: true
    rules:
      - "shape transformation"
      - "boundary isolation"
    output: "mapper"

  normalizer:
    suffix: ".normalizer.ts"
    layer_hint: "support"
    match:
      scope: "utility"
    rules:
      - "standardizes values"
      - "does not own business decisions"
    output: "normalizer"

  formatter:
    suffix: ".formatter.ts"
    layer_hint: "support"
    match:
      scope: "utility"
      output_formatting: true
    rules:
      - "presentation transformation"
    output: "formatter"

  domain:
    suffix: ".domain.ts"
    layer_hint: "domain"
    match:
      contains_business_rules: true
      mutates_state: true
      depends_on_external_systems: false
    rules:
      - "encapsulates core business logic"
    forbidden:
      - "framework_dependency"
      - "io"
    output: "domain"

  event:
    suffix: ".event.ts"
    layer_hint: "domain"
    match:
      is_immutable: true
    rules:
      - "represents something that happened"
    output: "event"

  listener:
    suffix: ".listener.ts"
    layer_hint: "infrastructure"
    match:
      interacts_with: ["event_system"]
    rules:
      - "reacts to events"
    output: "listener"

  publisher:
    suffix: ".publisher.ts"
    layer_hint: "infrastructure"
    match:
      interacts_with: ["event_system"]
      has_side_effects: true
    rules:
      - "emits events"
    output: "publisher"

  repository:
    suffix: ".repository.ts"
    layer_hint: "infrastructure"
    match:
      interacts_with: ["database"]
    rules:
      - "data access abstraction"
      - "encapsulates persistence"
    forbidden:
      - "contains_business_rules"
    output: "repository"

  schema:
    suffix: ".schema.ts"
    layer_hint: "support"
    match:
      scope: "data"
    rules:
      - "defines structure only"
    output: "schema"

  client:
    suffix: ".client.ts"
    layer_hint: "infrastructure"
    match:
      interacts_with: ["external_api"]
    rules:
      - "external communication"
      - "translates external protocol details"
    forbidden:
      - "contains_business_rules"
    output: "client"

  adapter:
    suffix: ".adapter.ts"
    layer_hint: "infrastructure"
    match:
      transforms_interfaces: true
    rules:
      - "bridges systems"
      - "adapts incompatible interfaces"
    output: "adapter"

  factory:
    suffix: ".factory.ts"
    layer_hint: "support"
    match:
      input_output_shape: "constructs"
    rules:
      - "creates objects"
      - "centralizes construction decisions"
    output: "factory"

  builder:
    suffix: ".builder.ts"
    layer_hint: "support"
    match:
      step_by_step_construction: true
    rules:
      - "incremental build"
    output: "builder"

  validator:
    suffix: ".validator.ts"
    layer_hint: "support"
    match:
      input_output_shape: "validates"
    rules:
      - "validation only"
    output: "validator"

  resolver:
    suffix: ".resolver.ts"
    layer_hint: "support"
    match:
      dynamic_resolution: true
    rules:
      - "resolves implementation"
      - "does not execute resolved implementation"
    output: "resolver"

  strategy:
    suffix: ".strategy.ts"
    layer_hint: "support"
    match:
      interchangeable_algorithms: true
    rules:
      - "multiple implementations"
      - "interchangeable behavior unit"
    output: "strategy"

  module:
    suffix: ".module.ts"
    layer_hint: "support"
    match:
      scope: "structural"
    rules:
      - "wires dependencies"
      - "registers providers/controllers/imports/exports"
    forbidden:
      - "contains_business_rules"
    output: "module"

  dto:
    suffix: ".dto.ts"
    layer_hint: "support"
    match:
      scope: "data"
      transport_related: true
    rules:
      - "transport shape"
      - "external contract"
    output: "dto"

  config:
    suffix: ".config.ts"
    layer_hint: "support"
    match:
      scope: "configuration"
    rules:
      - "configuration values"
    output: "config"

  error:
    suffix: ".error.ts"
    layer_hint: "support"
    match:
      represents_error: true
    rules:
      - "error definition"
    output: "error"

  types:
    suffix: ".types.ts"
    layer_hint: "support"
    match:
      type_only: true
    rules:
      - "no runtime code"
    output: "types"

  constants:
    suffix: ".const.ts"
    layer_hint: "support"
    match:
      scope: "constants"
    rules:
      - "static values"
    output: "constants"

  enum:
    suffix: ".enum.ts"
    layer_hint: "support"
    match:
      finite_set: true
    rules:
      - "controlled values"
    output: "enum"

  util:
    suffix: ".util.ts"
    layer_hint: "support"
    match:
      scope: "utility"
    rules:
      - "stateless helper"
      - "must be generic and not domain-specific"
    warning: "last resort role"
    requires_explicit_justification: true
    forbidden:
      - "business_logic"
      - "mixed_responsibilities"
    output: "util"

validation:
  fail_conditions:
    - "no_role_matches"
    - "multiple_roles_match"
    - "role_requires_missing_signal"
    - "role_conflicts_with_architecture_layer"
    - "util_selected_without_justification"
