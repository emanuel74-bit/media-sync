version: "1.0"

system:
    name: "class-role-classifier"
    purpose: >
        Determine the correct architectural role (file suffix) for a class
        based on its responsibilities, behavior, and constraints.

    philosophy:
        - "Every class has exactly one role"
        - "Roles are defined by responsibility, not naming"
        - "If multiple roles apply → decomposition required"
        - "If unclear → fail_closed"
        - "Behavior defines placement, not intention"

    enforcement:
        mode: "strict"
        ambiguity_policy: "fail_closed"
        multi_role_policy: "reject_and_decompose"

# =========================================================
# CLASS INPUT CONTRACT
# =========================================================

input:
    class_description:
        responsibilities: []
        has_side_effects: boolean
        mutates_state: boolean
        depends_on_external_systems: boolean
        contains_business_rules: boolean
        is_pure_functional: boolean
        scope: "single_action | multi_step | utility | structural | data | decision"
        input_output_shape: "none | transforms | validates | constructs"
        interacts_with:
            - "http"
            - "websocket"
            - "database"
            - "external_api"
            - "event_system"
            - "none"

# =========================================================
# EVALUATION ORDER
# =========================================================

evaluation_order:
    - detect_transport_layer
    - detect_execution_layer
    - detect_decision_layer
    - detect_transformation_layer
    - detect_domain_layer
    - detect_data_layer
    - detect_integration_layer
    - detect_construction_layer
    - detect_validation_layer
    - detect_resolution_layer
    - detect_structure_layer
    - detect_config_layer
    - detect_error_layer
    - detect_type_layer
    - detect_constants_layer
    - fallback

# =========================================================
# ROLE DEFINITIONS
# =========================================================

roles:
    # =========================================================
    # TRANSPORT LAYER
    # =========================================================

    controller:
        suffix: ".controller.ts"
        match:
            interacts_with: ["http"]
        rules:
            - "handles incoming requests"
            - "delegates logic outward"
        forbidden:
            - contains_business_rules
            - has_side_effects
        output: "controller"

    gateway:
        suffix: ".gateway.ts"
        match:
            interacts_with: ["websocket"]
        rules:
            - "manages connections"
            - "handles real-time messaging"
        forbidden:
            - contains_business_rules
        output: "gateway"

    # =========================================================
    # EXECUTION LAYER
    # =========================================================

    use_case:
        suffix: ".use-case.ts"
        match:
            scope: "single_action"
            contains_business_rules: true
        rules:
            - "one input → one outcome"
            - "encapsulates full action"
        output: "use_case"

    service:
        suffix: ".service.ts"
        match:
            has_side_effects: true
            scope: "multi_step"
        rules:
            - "coordinates dependencies"
            - "owns side effects"
        output: "service"

    orchestrator:
        suffix: ".orchestrator.ts"
        match:
            scope: "multi_step"
            contains_business_rules: false
        rules:
            - "controls execution flow"
        forbidden:
            - contains_business_rules
        output: "orchestrator"

    # =========================================================
    # DECISION LAYER
    # =========================================================

    policy:
        suffix: ".policy.ts"
        match:
            contains_business_rules: true
            mutates_state: false
            has_side_effects: false
        rules:
            - "returns decision"
        output: "policy"

    specification:
        suffix: ".specification.ts"
        match:
            contains_business_rules: true
            is_composable: true
        rules:
            - "composable logic"
        output: "specification"

    selector:
        suffix: ".selector.ts"
        match:
            scope: "decision"
        rules:
            - "chooses one option"
        output: "selector"

    guard:
        suffix: ".guard.ts"
        match:
            scope: "decision"
            context_based: true
        rules:
            - "authorization logic"
        output: "guard"

    # =========================================================
    # TRANSFORMATION LAYER
    # =========================================================

    mapper:
        suffix: ".mapper.ts"
        match:
            input_output_shape: "transforms"
            is_pure_functional: true
        rules:
            - "shape transformation"
        output: "mapper"

    normalizer:
        suffix: ".normalizer.ts"
        match:
            scope: "utility"
        rules:
            - "standardizes values"
        output: "normalizer"

    formatter:
        suffix: ".formatter.ts"
        match:
            scope: "utility"
            output_formatting: true
        rules:
            - "presentation transformation"
        output: "formatter"

    # =========================================================
    # DOMAIN LAYER
    # =========================================================

    domain:
        suffix: ".domain.ts"
        match:
            contains_business_rules: true
            mutates_state: true
            depends_on_external_systems: false
        rules:
            - "encapsulates core business logic"
        output: "domain"

    event:
        suffix: ".event.ts"
        match:
            is_immutable: true
        rules:
            - "represents something that happened"
        output: "event"

    listener:
        suffix: ".listener.ts"
        match:
            interacts_with: ["event_system"]
        rules:
            - "reacts to events"
        output: "listener"

    publisher:
        suffix: ".publisher.ts"
        match:
            interacts_with: ["event_system"]
            has_side_effects: true
        rules:
            - "emits events"
        output: "publisher"

    # =========================================================
    # DATA LAYER
    # =========================================================

    repository:
        suffix: ".repository.ts"
        match:
            interacts_with: ["database"]
        rules:
            - "data access abstraction"
        forbidden:
            - contains_business_rules
        output: "repository"

    schema:
        suffix: ".schema.ts"
        match:
            scope: "data"
        rules:
            - "defines structure only"
        output: "schema"

    # =========================================================
    # INTEGRATION LAYER
    # =========================================================

    client:
        suffix: ".client.ts"
        match:
            interacts_with: ["external_api"]
        rules:
            - "external communication"
        output: "client"

    adapter:
        suffix: ".adapter.ts"
        match:
            transforms_interfaces: true
        rules:
            - "bridges systems"
        output: "adapter"

    # =========================================================
    # CONSTRUCTION LAYER
    # =========================================================

    factory:
        suffix: ".factory.ts"
        match:
            input_output_shape: "constructs"
        rules:
            - "creates objects"
        output: "factory"

    builder:
        suffix: ".builder.ts"
        match:
            step_by_step_construction: true
        rules:
            - "incremental build"
        output: "builder"

    # =========================================================
    # VALIDATION
    # =========================================================

    validator:
        suffix: ".validator.ts"
        match:
            input_output_shape: "validates"
        rules:
            - "validation only"
        output: "validator"

    # =========================================================
    # RESOLUTION
    # =========================================================

    resolver:
        suffix: ".resolver.ts"
        match:
            dynamic_resolution: true
        rules:
            - "resolves implementation"
        output: "resolver"

    strategy:
        suffix: ".strategy.ts"
        match:
            interchangeable_algorithms: true
        rules:
            - "multiple implementations"
        output: "strategy"

    # =========================================================
    # STRUCTURE
    # =========================================================

    module:
        suffix: ".module.ts"
        match:
            scope: "structural"
        rules:
            - "wires dependencies"
        forbidden:
            - contains_business_rules
        output: "module"

    dto:
        suffix: ".dto.ts"
        match:
            scope: "data"
            transport_related: true
        rules:
            - "transport shape"
        output: "dto"

    # =========================================================
    # CONFIG / ERROR / TYPES / CONSTANTS
    # =========================================================

    config:
        suffix: ".config.ts"
        match:
            scope: "configuration"
        rules:
            - "static values"
        output: "config"

    error:
        suffix: ".error.ts"
        match:
            represents_error: true
        rules:
            - "error definition"
        output: "error"

    types:
        suffix: ".types.ts"
        match:
            type_only: true
        rules:
            - "no runtime code"
        output: "types"

    constants:
        suffix: ".const.ts"
        match:
            scope: "constants"
        rules:
            - "static values"
        output: "constants"

    enum:
        suffix: ".enum.ts"
        match:
            finite_set: true
        rules:
            - "controlled values"
        output: "enum"

    # =========================================================
    # FALLBACK
    # =========================================================

    util:
        suffix: ".util.ts"
        match:
            scope: "utility"
        rules:
            - "stateless helper"
        warning: "last resort role"
        output: "util"
