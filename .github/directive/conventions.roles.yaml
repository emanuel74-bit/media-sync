version: "1.0"

system:
    name: "class-role-classification-system"
    goal: >
        Determine the correct architectural role (file suffix) for a class
        based on its responsibilities, behavior, dependencies, and constraints.

    principle:
        - "Each class has exactly one primary role"
        - "Role is determined by behavior, not intent or naming"
        - "Side effects dominate classification"
        - "Single responsibility is mandatory"
        - "If multiple roles match, choose highest precedence violation role"

# ------------------------------------------------------------
# INPUT MODEL
# ------------------------------------------------------------

input_schema:
    required_fields:
        - has_side_effects
        - handles_http
        - handles_realtime
        - accesses_database
        - performs_transformation_only
        - performs_decision_logic
        - creates_objects
        - orchestrates_multiple_dependencies
        - defines_domain_state
        - emits_or_handles_events
        - validates_input
        - resolves_dependencies
        - configuration_only
        - type_only

    optional_fields:
        - description
        - dependencies
        - outputs
        - mutability
        - external_calls

# ------------------------------------------------------------
# ROLE CLASSIFICATION RULES (HIGHEST PRIORITY FIRST)
# ------------------------------------------------------------

roles:
    controller:
        match:
            - handles_http == true
            - OR transport_layer_entry == true
        constraints:
            - no_business_logic: true
            - must_delegate_all_work: true
        output: ".controller.ts"

    gateway:
        match:
            - handles_realtime == true
        constraints:
            - no_business_logic: true
            - manages_connections_only: true
        output: ".gateway.ts"

    use_case:
        match:
            - single_business_action == true
            - orchestrates_workflow == true
        constraints:
            - one_input_one_outcome: true
            - may_call_services: true
        output: ".use-case.ts"

    service:
        match:
            - orchestrates_multiple_dependencies == true
            - has_side_effects == true
        constraints:
            - owns_workflow_logic: true
            - no_transport_logic: true
        output: ".service.ts"

    orchestrator:
        match:
            - multi_step_process_control == true
            - primarily_controls_flow == true
        constraints:
            - no_core_business_rules: true
            - sequencing_only: true
        output: ".orchestrator.ts"

    repository:
        match:
            - accesses_database == true
        constraints:
            - no_business_logic: true
            - crud_only: true
        output: ".repository.ts"

    client:
        match:
            - external_api_calls == true
        constraints:
            - translates_external_formats: true
            - no_domain_logic: true
        output: ".client.ts"

    adapter:
        match:
            - interface_conversion_between_systems == true
        constraints:
            - no_business_logic: true
        output: ".adapter.ts"

    domain:
        match:
            - defines_domain_state == true
            - contains_behavior_and_invariants == true
        constraints:
            - independent_of_infrastructure: true
            - enforces_invariants: true
        output: ".domain.ts"

    event:
        match:
            - is_immutable_event == true
        constraints:
            - data_only: true
        output: ".event.ts"

    listener:
        match:
            - reacts_to_events == true
        constraints:
            - triggers_side_effects: true
        output: ".listener.ts"

    publisher:
        match:
            - emits_events == true
        constraints:
            - no_business_logic: true
        output: ".publisher.ts"

    mapper:
        match:
            - performs_transformation_only == true
            - no_side_effects == true
        constraints:
            - deterministic: true
        output: ".mapper.ts"

    normalizer:
        match:
            - standardizes_data_shape == true
        constraints:
            - preserves_structure: true
        output: ".normalizer.ts"

    formatter:
        match:
            - formats_output_only == true
        constraints:
            - presentation_only: true
        output: ".formatter.ts"

    policy:
        match:
            - performs_decision_logic == true
            - returns_boolean_or_score == true
        constraints:
            - no_mutation: true
        output: ".policy.ts"

    specification:
        match:
            - composes_business_rules == true
        constraints:
            - composable_logic: true
        output: ".specification.ts"

    selector:
        match:
            - selects_single_option == true
        constraints:
            - minimal_logic: true
        output: ".selector.ts"

    guard:
        match:
            - handles_authorization == true
        constraints:
            - context_based_decision_only: true
        output: ".guard.ts"

    factory:
        match:
            - creates_objects == true
            - encapsulates_construction_logic == true
        constraints:
            - may_apply_defaults: true
        output: ".factory.ts"

    builder:
        match:
            - step_by_step_construction == true
        constraints:
            - final_build_required: true
        output: ".builder.ts"

    util:
        match:
            - generic_helpers_only == true
        constraints:
            - stateless: true
            - no_domain_meaning: true
        output: ".util.ts"

    resolver:
        match:
            - resolves_dependency_or_value == true
        constraints:
            - runtime_selection: true
        output: ".resolver.ts"

    strategy:
        match:
            - interchangeable_algorithm == true
        constraints:
            - runtime_swappable: true
        output: ".strategy.ts"

    validator:
        match:
            - validates_input_or_state == true
        constraints:
            - no_mutation: true
        output: ".validator.ts"

    config:
        match:
            - configuration_only == true
        constraints:
            - static_values_only: true
        output: ".config.ts"

    error:
        match:
            - defines_error_types == true
        constraints:
            - no_logic: true
        output: ".error.ts"

    types:
        match:
            - type_only == true
        constraints:
            - no_runtime_code: true
        output: ".types.ts"

    const:
        match:
            - static_constants_only == true
        constraints:
            - no_behavior: true
        output: ".const.ts"

    enum:
        match:
            - finite_value_set == true
        constraints:
            - controlled_values_only: true
        output: ".enum.ts"

    dto:
        match:
            - transport_data_shape == true
        constraints:
            - no_business_logic: true
        output: ".dto.ts"

# ------------------------------------------------------------
# PRIORITY RULES (CRITICAL FOR CONFLICT RESOLUTION)
# ------------------------------------------------------------

precedence:
    highest_to_lowest:
        - controller
        - gateway
        - use_case
        - service
        - orchestrator
        - repository
        - client
        - adapter
        - domain
        - listener
        - publisher
        - policy
        - specification
        - guard
        - resolver
        - strategy
        - factory
        - builder
        - validator
        - mapper
        - normalizer
        - formatter
        - dto
        - config
        - error
        - const
        - enum
        - types
        - util

# ------------------------------------------------------------
# CONFLICT RESOLUTION RULES
# ------------------------------------------------------------

conflict_resolution:
    rule: "first_violation_wins"

    logic:
        - if has_side_effects and performs_transformation_only:
              choose: service
        - if handles_http and orchestrates_logic:
              choose: controller
        - if creates_objects and has_business_rules:
              choose: factory
        - if validates_input and has_side_effects:
              override_to: validator_error (invalid_design)

# ------------------------------------------------------------
# HARD CONSTRAINTS (INVALID STATES)
# ------------------------------------------------------------

invalid_class_patterns:
    - name: "business_logic_in_controller"
      condition:
          - handles_http == true
          - has_business_logic == true
      action: "reject"

    - name: "database_logic_in_service_bypass_repository"
      condition:
          - accesses_database == true
          - repository_not_used == true
      action: "warn_or_reclassify"

    - name: "domain_with_external_dependency"
      condition:
          - defines_domain_state == true
          - external_api_calls == true
      action: "reject"

# ------------------------------------------------------------
# OUTPUT FORMAT
# ------------------------------------------------------------

output:
    format: "single_role"
    fields:
        - role_suffix
        - justification_rule
        - violations_detected
