evaluation_order:
    - structure_validation
    - naming_validation
    - test_type_classification
    - service_detection
    - mocking_validation
    - coverage_validation
    - interaction_validation
    - test_design_validation
    - forbidden_validation
    - trigger_validation

definitions:
    service:
        description: >
            A class is a service if it contains at least one method that includes:
            - branching logic (if / switch / loops / try-catch)
            OR
            - sequential orchestration (multiple function calls executed in order)
        detection:
            must_have_method_with:
                - branching_constructs
                - OR sequential_function_calls

    business_logic:
        description: >
            Pure logic that transforms inputs into outputs based on rules.
            It does NOT include I/O or external system interaction.
        must_be:
            - deterministic
            - input_output_transformation
        must_not_include:
            - external_system_calls
            - filesystem
            - network_calls
            - database_calls

    service_interaction:
        description: >
            Runtime execution flow where one class method calls another class method
            across module boundaries in /src via dependency usage or orchestration.
        detection:
            requires:
                - cross_class_runtime_call
                - OR dependency_invocation_chain
                - OR sequential orchestration across modules

    external_system:
        description: >
            Hard boundary dependencies that perform I/O or external communication.
        includes:
            - http_clients
            - database_drivers
            - file_system
            - message_brokers
        must_not_include:
            - internal_services
            - domain_logic
            - mappers
            - factories
            - pure_functions

rules:
    structure:
        must:
            - all_tests_under: "/test"
            - mirror_structure_with: "/src"
        must_not:
            - tests_inside_src: true

        detection:
            positive:
                - path_prefix: "/test/"
            negative:
                - path_prefix: "/src/"

    naming:
        must:
            - allowed_suffixes:
                  - ".test.ts"
                  - ".spec.ts"
        must_not:
            - suffix_patterns:
                  - "*.tests.ts"
                  - "*.test.js"
                  - "*.spec.js"

    test_type_classification:
        unit_test:
            requires:
                - single_service_under_test
                - no_service_interactions

        integration_test:
            requires:
                - service_interactions_present

    coverage:
        must:
            - every_service_has_test: true
            - every_business_logic_unit_has_test: true

        detection:
            service_source: "/src/**/*.ts (service definition rules apply)"
            test_source: "/test/**/*.{test,spec}.ts"

    mocking:
        must:
            - only_external_systems_may_be_mocked: true

        must_not:
            - mock_domain_logic: true
            - mock_pure_functions: true
            - mock_mappers: true
            - mock_factories: true
            - mock_internal_services: true

        detection:
            allowed_mocks:
                - http_clients
                - database_drivers
                - file_system
                - message_brokers

    test_design:
        must:
            - tests_isolated: true

        must_not:
            - shared_mutable_state: true
            - order_dependent_tests: true

        detection_signals:
            isolation:
                - no_global_state_mutation
                - independent_setup_per_test

    forbidden:
        must_not:
            - skipped_tests: true
            - commented_out_tests: true
            - over_mocking_modules: true

        detection:
            skipped:
                - "test.skip"
                - "it.skip"
            commented_tests:
                - regex: "(it|test)\\s*\\(.*\\)\\s*//"
            over_mocking:
                - jest_mock_whole_module: true

triggers:
    test_creation:
        must_fire_when:
            - service_detected_in_src
            - business_logic_detected
            - service_interaction_detected

validation_rules:
    agent_must_verify:
        - each_service_has_corresponding_tests
        - test_structure_mirrors_src
        - no_internal_mocking_used
        - integration_tests_only_for_interactions

violation_model:
    output_format:
        must_include:
            - rule_id
            - violation_type
            - file_path
            - detected_signal
            - explanation
            - severity
