version: '1.0'
file:
  name: conventions.orchestrator.yaml
  path: core/conventions.orchestrator.yaml
  role: global_orchestrator_contract
  executability: orchestrator
purpose: Coordinate the full 42-file pipeline, phase gates, handoffs, risk revision, and fail-closed execution.
ownership:
  owns:
  - global_execution_order
  - phase_gates
  - handoff_rules
  - subsystem_order
  - fail_closed_policy
  does_not_own:
  - detailed_subsystem_rules
  - vocabulary_definitions
  - validation_rule_details
activation:
  mode: always
  activates_when: []
  skips_when: []
inputs:
  required: []
  optional: []
outputs:
  produces:
  - global_execution_plan
dependencies:
  required_files:
  - core/conventions.file-contract.yaml
  optional_files: []
sections:
  agent_integration:
    pre_pipeline_steps:
    - classify_agent_request_mode
    - produce_agent_context_request
    - request_active_file_manifest_from_core_routing
    rule: Core orchestrator remains authoritative for pipeline phase order.
  global_execution_order:
  - route_request
  - load_active_contracts
  - extract_behavior_contract
  - initialize_decision_log
  - classify_risk_initial
  - classify_boundaries_initial
  - classify_contracts_if_boundaries_exist
  - classify_dependency_constraints_initial
  - perform_codebase_reconnaissance_if_active
  - align_with_local_conventions_if_active
  - decompose_architecture
  - generate_artifact_candidates
  - draft_role_pass
  - resolve_artifact_actions_if_active
  - validate_post_action_artifacts_if_active
  - detect_refactor_context_if_active
  - evaluate_behavior_preservation_requirements_if_refactor_active
  - select_refactor_strategy_if_active
  - validate_refactor_strategy_decision_if_active
  - final_role_assignment
  - reclassify_risk_after_actions
  - revise_boundary_contract_dependency_classifications_if_needed
  - resolve_role_collisions_if_needed
  - detect_pattern_pressure_if_needed
  - select_patterns_if_needed
  - validate_role_pattern_compatibility_if_needed
  - analyze_change_impact_if_active
  - revise_refactor_strategy_if_impact_invalidates_it
  - reclassify_risk_after_impact
  - update_decision_log_after_impact
  - refine_design
  - render_minimum_sufficient_structure
  - validate_dependencies_after_structure
  - derive_tests_if_needed
  - draft_implementation_sequence_if_needed
  - validate_final_plan
  - finalize_implementation_sequence_if_needed
  - execute_feedback_loop_if_coding
  - validate_final_result
  phase_gates:
    before_architecture:
    - behavior_contract
    - initial_risk_classification
    before_action_resolution:
    - architecture_blueprint
    - artifact_candidates
    - action_taxonomy
    before_role_assignment:
    - post_action_artifact_candidates
    before_pattern_selection:
    - role_assignment_table
    before_structure_rendering:
    - architecture_blueprint
    - role_assignment_table
    - dependency_constraints
    before_implementation_sequence:
    - validation_report
    - decision_log
    before_feedback_loop:
    - implementation_sequence_plan
    before_refactor_strategy:
    - artifact_action_table
    - draft_role_signals
    - risk_classification
    - behavior_contract
    before_final_role_assignment:
    - post_action_artifact_candidates
    - refactor_strategy_decision_if_active
  handoff_rules:
    behavior_to_risk:
    - behavior_contract -> risk_resolution
    boundary_to_contracts:
    - boundary_classification -> contract_classification
    actions_to_roles:
    - post_action_artifact_candidates -> role_assignment
    impact_to_execution:
    - change_impact_report -> implementation_sequence
    draft_roles_to_actions:
    - draft_role_signals -> action_resolution
    actions_to_refactoring:
    - artifact_action_table -> refactor_strategy_selection
    - post_action_artifact_candidates -> behavior_preservation_requirements
    refactoring_to_impact:
    - refactor_strategy_decision -> change_impact_analysis
    - behavior_preservation_requirements -> change_impact_analysis
    refactoring_to_testing:
    - behavior_preservation_requirements -> test_derivation
    refactoring_to_execution:
    - refactor_strategy_decision -> implementation_sequence
    - behavior_preservation_requirements -> implementation_sequence
  risk_revision_policy:
  - Risk may be revised after actions, boundary/contract/dependency classification, impact, and feedback
  - Risk de-escalation requires decision log evidence
  no_code_change_orchestration:
    skip:
    - structure_rendering
    - implementation_sequence
    - feedback_loop
    required:
    - behavior_contract
    - codebase_reconnaissance_report
    - artifact_action_table
    - decision_log
    - validation_report
validation:
  fail_conditions:
  - id: CORE-CONVENTIONS-ORCHESTRATOR-YAML-FC-001
    condition: phase_gate_missing_required_input
    message: Phase gate missing required input.
    severity: error
    owner: core/conventions.orchestrator.yaml
  - id: CORE-CONVENTIONS-ORCHESTRATOR-YAML-FC-002
    condition: risk_deescalated_without_evidence
    message: Risk deescalated without evidence.
    severity: error
    owner: core/conventions.orchestrator.yaml
  - id: CORE-CONVENTIONS-ORCHESTRATOR-YAML-FC-003
    condition: feedback_loop_without_sequence
    message: Feedback loop without sequence.
    severity: error
    owner: core/conventions.orchestrator.yaml
  - id: CORE-ORCH-REFACTOR-001
    condition: refactor_strategy_runs_before_artifact_actions
    message: Refactor strategy must run after artifact action resolution.
    severity: error
    owner: core/conventions.orchestrator.yaml
  - id: CORE-ORCH-ROLE-001
    condition: final_role_assignment_runs_before_refactor_decision
    message: Final role assignment must run after action/refactor decisions.
    severity: error
    owner: core/conventions.orchestrator.yaml
  required_checks: []
