version: "1.1"

system:
  name: "design-pattern-selector"
  purpose: >
    Given a feature, artifact, or code requirement, determine the most appropriate
    design pattern using structured decision rules derived from the full
    Refactoring.Guru catalog.
  philosophy:
    - "Pattern follows problem, not preference"
    - "Classify intent before selecting pattern"
    - "Avoid over-engineering"
    - "Prefer simplest valid pattern"
    - "Patterns refine implementation; they do not redefine architecture"
  authority:
    role: "global_design_pattern_catalog"
    can_override:
      - "architecture_pattern_whitelist"
    cannot_override:
      - "architecture_layers"
      - "dependency_direction"
      - "module_boundaries"
      - "data_flow_rules"
      - "single_responsibility"
  orchestration:
    controlled_by: "conventions.orchestrator.yaml"
    requires:
      - "stable_intent"
      - "role_assigned"
      - "layer_assigned"
      - "dependency_graph_defined"
    forbidden:
      - "pattern_before_role"
      - "pattern_before_layer"
      - "pattern_for_future_use"
      - "pattern_that_changes_artifact_role"

pattern_scope:
  default_level: "intra_artifact_or_local_collaboration"
  description: >
    Patterns apply within an artifact or between closely related artifacts in
    the same architectural boundary. They must not create cross-layer leakage
    or redefine module boundaries.

pattern_constraints:
  must_respect:
    - "architecture_layers"
    - "dependency_direction"
    - "module_boundaries"
    - "single_responsibility"
    - "dependency_inversion"
  forbidden:
    - "cross_layer_leakage"
    - "introducing_circular_dependencies"
    - "bypassing_service_layer"
    - "changing_artifact_role"
    - "adding_speculative_abstraction"
  enforcement:
    violation: "reject_pattern"

classification:
  categories:
    creational:
      description: >
        Focused on object creation mechanisms that increase flexibility and reuse.
      triggers:
        - "object creation is complex"
        - "object type decided at runtime"
        - "avoid direct constructor usage"
        - "control instance lifecycle"
        - "reduce coupling to concrete classes"

    structural:
      description: >
        Focused on composing classes and objects into larger structures.
      triggers:
        - "combine multiple components"
        - "wrap or adapt existing code"
        - "simplify complex subsystem"
        - "optimize memory usage"
        - "control access to object"

    behavioral:
      description: >
        Focused on communication and responsibility between objects.
      triggers:
        - "multiple objects interact"
        - "behavior changes at runtime"
        - "decouple sender and receiver"
        - "define workflows or chains"
        - "encapsulate algorithms"

patterns:
  Singleton:
    category: "creational"
    use_when:
      - "exactly one instance is required"
      - "global shared resource"
    avoid_when:
      - "testability is critical"
      - "hidden dependencies are undesirable"
      - "dependency injection can provide lifecycle safely"
    architecture_guardrails:
      - "must not create hidden global state"
      - "must not bypass DI"

  FactoryMethod:
    category: "creational"
    use_when:
      - "subclasses decide object type"
      - "object creation varies by context"
    signals:
      - "switch/if on type"
      - "constructor logic branching"

  AbstractFactory:
    category: "creational"
    use_when:
      - "families of related objects"
      - "must enforce compatibility between objects"
    signals:
      - "multiple related product types"

  Builder:
    category: "creational"
    use_when:
      - "complex object construction"
      - "step-by-step creation"
    signals:
      - "many optional parameters"
      - "telescoping constructor"

  Prototype:
    category: "creational"
    use_when:
      - "clone existing objects"
      - "object creation is expensive"
    signals:
      - "copying objects frequently"

  Adapter:
    category: "structural"
    use_when:
      - "incompatible interfaces"
      - "reuse legacy/external code"
    signals:
      - "interface mismatch"
    architecture_guardrails:
      - "adapter must stay at a boundary"
      - "adapter must not leak external model inward"

  Bridge:
    category: "structural"
    use_when:
      - "separate abstraction from implementation"
      - "avoid class explosion"
    signals:
      - "multiple dimensions of variation"

  Composite:
    category: "structural"
    use_when:
      - "tree structure"
      - "treat individual and group uniformly"
    signals:
      - "recursive composition"

  Decorator:
    category: "structural"
    use_when:
      - "add behavior dynamically"
      - "avoid subclass explosion"
    signals:
      - "stackable responsibilities"

  Facade:
    category: "structural"
    use_when:
      - "simplify complex subsystem"
      - "provide unified interface"
    signals:
      - "many dependencies hidden behind one API"
    architecture_guardrails:
      - "facade must not hide boundary violations"
      - "facade must not become a god service"

  Flyweight:
    category: "structural"
    use_when:
      - "large number of similar objects"
      - "memory optimization needed"
    signals:
      - "shared intrinsic state"

  Proxy:
    category: "structural"
    use_when:
      - "control access to object"
      - "lazy loading / remote access"
    signals:
      - "intercept calls"

  ChainOfResponsibility:
    category: "behavioral"
    use_when:
      - "multiple handlers for request"
      - "decouple sender from receiver"
    signals:
      - "pass request along chain"

  Command:
    category: "behavioral"
    use_when:
      - "encapsulate actions as objects"
      - "support undo/redo"
    signals:
      - "queue, log, or execute commands"

  Iterator:
    category: "behavioral"
    use_when:
      - "traverse collection without exposing structure"
    signals:
      - "custom traversal logic"

  Mediator:
    category: "behavioral"
    use_when:
      - "reduce direct dependencies between components"
    signals:
      - "many-to-many communication chaos"
    architecture_guardrails:
      - "mediator must not centralize unrelated business logic"
      - "mediator must not cross unrelated module boundaries"

  Memento:
    category: "behavioral"
    use_when:
      - "save/restore object state"
    signals:
      - "undo history"

  Observer:
    category: "behavioral"
    use_when:
      - "event-driven updates"
      - "publish/subscribe"
    signals:
      - "state change notifications"

  State:
    category: "behavioral"
    use_when:
      - "object behavior depends on state"
    signals:
      - "large conditional state machine"

  Strategy:
    category: "behavioral"
    use_when:
      - "multiple interchangeable algorithms"
    signals:
      - "if/else selecting behavior"
      - "conditional logic selects behavior"

  TemplateMethod:
    category: "behavioral"
    use_when:
      - "algorithm skeleton with overridable steps"
    signals:
      - "shared workflow with variations"

  Visitor:
    category: "behavioral"
    use_when:
      - "add operations without modifying classes"
    signals:
      - "stable structure, changing behavior"

decision_flow:
  - step: "verify_prerequisites"
    requires:
      - "stable_intent"
      - "role_assigned"
      - "layer_assigned"
      - "dependency_graph_defined"

  - step: "detect_primary_problem_type"
    action: >
      Match feature or artifact description against category triggers:
      creational, structural, or behavioral.

  - step: "detect_problem_signals"
    action: >
      Extract concrete signals such as conditionals on type, object creation
      complexity, communication patterns, state transitions, and structure
      composition issues.

  - step: "candidate_patterns"
    action: >
      Filter patterns by matching category, signals, and use_when rules.

  - step: "eliminate_conflicts"
    action: >
      Remove patterns where avoid_when or architecture guardrails are triggered.

  - step: "validate_architecture_constraints"
    action: >
      Reject candidates that change layers, dependency direction, module
      boundaries, artifact roles, or data flow.

  - step: "rank_patterns"
    criteria:
      - "simplicity"
      - "minimal_abstraction"
      - "alignment_with_problem"
      - "scalability"
      - "testability"

  - step: "output"
    format:
      primary_pattern: "string | none"
      alternatives: ["string"]
      reasoning: "text explanation"
      confidence: "low | medium | high"

heuristics:
  - rule: "avoid_pattern_if_simple_solution_exists"
  - rule: "do_not_use_singleton_for_convenience"
  - rule: "prefer_strategy_over_conditionals"
  - rule: "prefer_composition_over_inheritance"
  - rule: "avoid_overengineering_for_small_features"
  - rule: "do_not_apply_pattern_without_detected_signal"

input_schema:
  feature_description: "string"
  artifact_role: "string"
  layer: "string"
  constraints:
    scalability: "low | medium | high"
    flexibility: "low | medium | high"
    performance: "low | medium | high"
  signals:
    dynamic_behavior: "boolean"
    complex_creation: "boolean"
    many_dependencies: "boolean"
    conditional_logic: "boolean"
    state_machine: "boolean"
    external_interface_mismatch: "boolean"

output_schema:
  primary_pattern: "string | none"
  category: "creational | structural | behavioral | none"
  alternatives: ["string"]
  reasoning: "string"
  tradeoffs:
    pros: ["string"]
    cons: ["string"]
  confidence: "low | medium | high"
  architecture_compatibility: "valid | invalid"
