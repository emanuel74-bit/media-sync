version: "1.0"
file:
  name: "conventions.pattern-catalog.yaml"
  path: "patterns/conventions.pattern-catalog.yaml"
  role: "pattern_catalog_contract"
purpose: "Define accepted classic GoF and enterprise design patterns."
ownership:
  owns:
    - "pattern_definition_schema"
    - "classic_gof_patterns"
    - "enterprise_patterns"
    - "disallowed_pattern_names"
    - "deferred_pattern_names"
  does_not_own:
    - "pattern_selection_process"
    - "pattern_restriction_policy"
    - "role_pattern_compatibility"
    - "role_definitions"
activation:
  mode: "conditional"
  activates_when:
    - "pattern pressure is detected"
  skips_when: []
inputs:
  required:
    - "role_taxonomy"
  optional: []
outputs:
  produces:
    - "pattern_catalog"
    - "pattern_definition_registry"
dependencies:
  required_files:
    - "roles/conventions.role-taxonomy.yaml"
  optional_files: []
sections:
  pattern_catalog_policy:
    default_decision: "no_pattern"
  pattern_definition_schema:
    - "category"
    - "status"
    - "problem_it_solves"
    - "activate_when"
    - "reject_when"
    - "introduced_roles"
    - "compatible_roles"
    - "simpler_alternatives"
    - "validation_checks"
  patterns:
    FactoryMethod:
      category: "classic_gof.creational"
      status: "active"
      problem_it_solves: "FactoryMethod pattern pressure"
      activate_when:
        - "detected pressure matching pattern problem"
      reject_when:
        - "no activation signal"
        - "simpler alternative is enough"
        - "adds more complexity than it removes"
      introduced_roles:
        - "factory"
        - "interface"
      compatible_roles:
        - "factory"
        - "interface"
      simpler_alternatives:
        - "no_pattern"
        - "role_decomposition"
      validation_checks:
        - "activation signal present"
        - "introduced roles compatible"
        - "layer/dependency rules preserved"
