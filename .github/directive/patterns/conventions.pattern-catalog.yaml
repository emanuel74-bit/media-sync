version: '1.0'
file:
  name: conventions.pattern-catalog.yaml
  path: patterns/conventions.pattern-catalog.yaml
  role: pattern_catalog_contract
  executability: vocabulary
purpose: Define pattern vocabulary including classic, enterprise, conditional, and disallowed patterns.
ownership:
  owns:
  - pattern_enum
  - pattern_definitions
  - pattern_categories
  does_not_own:
  - pattern_selection_process
activation:
  mode: always
  activates_when: []
  skips_when: []
inputs:
  required: []
  optional: []
outputs:
  produces:
  - pattern_catalog_registry
dependencies:
  required_files: []
  optional_files: []
sections:
  pattern_enum:
