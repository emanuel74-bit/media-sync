    - NoPattern
    - Strategy
    - FactoryMethod
    - AbstractFactory
    - Builder
    - Adapter
    - Facade
    - Proxy
    - Decorator
    - Command
    - ChainOfResponsibility
    - Observer
    - Mediator
    - TemplateMethod
    - State
    - Specification
    - Policy
    - Repository
    - UnitOfWork
    - CQRS
    - Outbox
    - Saga
    - Pipeline
    - DomainEvent
    - AntiCorruptionLayer
    - Result
    - ContractVersioning
    - ServiceLocator
  pattern_definitions:
    NoPattern:
      definition: Default when no pattern pressure exists.
      activation_signals:
      - NoPattern pressure detected
      reject_when:
      - no pattern pressure
      - simpler direct design is sufficient
