    Memento:
      - "no_pattern"
      - "role_decomposition"
    Observer:
      - "no_pattern"
      - "role_decomposition"
    State:
      - "no_pattern"
      - "role_decomposition"
    Strategy:
      - "no_pattern"
      - "role_decomposition"
    TemplateMethod:
      - "no_pattern"
      - "role_decomposition"
    Visitor:
      - "no_pattern"
      - "role_decomposition"
    DependencyInjection:
      - "no_pattern"
      - "role_decomposition"
    PortsAndAdapters:
      - "no_pattern"
      - "role_decomposition"
    CQRS:
      - "no_pattern"
      - "role_decomposition"
    Specification:
      - "no_pattern"
      - "role_decomposition"
    DomainEvent:
      - "no_pattern"
      - "role_decomposition"
    Repository:
      - "no_pattern"
      - "role_decomposition"
    DataMapper:
      - "no_pattern"
      - "role_decomposition"
    UnitOfWork:
      - "no_pattern"
      - "role_decomposition"
    Projection:
      - "no_pattern"
      - "role_decomposition"
    ReadModel:
      - "no_pattern"
      - "role_decomposition"
    EventSourcing:
      - "no_pattern"
      - "role_decomposition"
    Outbox:
