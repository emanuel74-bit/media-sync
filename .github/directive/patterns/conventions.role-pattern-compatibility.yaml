    AntiCorruptionLayer:
      may_introduce:
        - "adapter"
        - "mapper"
        - "port"
        - "client"
        - "policy"
      status: "conditional"
    Saga:
      may_introduce:
        - "workflow"
        - "command"
        - "handler"
        - "domain_event"
        - "integration_event"
        - "policy"
        - "repository"
        - "state"
      status: "restricted"
    IdempotencyKey:
      may_introduce:
        - "guard"
        - "repository"
        - "record"
        - "policy"
        - "error"
      status: "active"
    RetryWithBackoff:
      may_introduce:
        - "policy"
        - "config"
        - "job"
        - "processor"
        - "adapter"
      status: "restricted"
    CircuitBreaker:
      may_introduce:
        - "adapter"
        - "client"
        - "policy"
        - "config"
        - "state"
      status: "restricted"
    Pipeline:
      may_introduce:
        - "processor"
        - "handler"
        - "task"
        - "validator"
        - "mapper"
        - "parser"
        - "normalizer"
      status: "active"
  role_pattern_rejection_matrix:
    service:
      - "pattern turns service into god facade"
    repository:
      - "pattern introduces business policy"
    strategy:
      - "only one implementation exists"
    factory:
      - "simple constructor is enough"
