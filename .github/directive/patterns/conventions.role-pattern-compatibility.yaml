version: '1.0'
file:
  name: conventions.role-pattern-compatibility.yaml
  path: patterns/conventions.role-pattern-compatibility.yaml
  role: role_pattern_compatibility_contract
  executability: decision_engine
purpose: Validate selected patterns are compatible with resolved roles and boundaries.
ownership:
  owns:
  - role_pattern_matrix
  - compatibility_rules
  does_not_own:
  - role_taxonomy
  - pattern_catalog
activation:
  mode: always
  activates_when: []
  skips_when: []
inputs:
  required: []
  optional: []
outputs:
  produces:
  - role_pattern_compatibility_result
dependencies:
  required_files:
  - roles/conventions.role-taxonomy.yaml
  - patterns/conventions.pattern-catalog.yaml
  - boundaries/conventions.boundary-taxonomy.yaml
  optional_files: []
sections:
  compatibility_examples:
    Strategy:
    - strategy
    - policy
    - service
    Adapter:
    - adapter
    - mapper
    - client
    Repository:
    - repository
    - port
    Command:
    - command
    - handler
validation:
  fail_conditions:
  - id: PATTERNS-CONVENTIONS-ROLE-PATTERN-COMPATIBILITY-YAML-FC-001
    condition: pattern_incompatible_with_role
    message: Pattern incompatible with role.
    severity: error
    owner: patterns/conventions.role-pattern-compatibility.yaml
  - id: PATTERNS-CONVENTIONS-ROLE-PATTERN-COMPATIBILITY-YAML-FC-002
    condition: pattern_introduces_forbidden_dependency
    message: Pattern introduces forbidden dependency.
    severity: error
    owner: patterns/conventions.role-pattern-compatibility.yaml
  required_checks: []
