  pattern_role_disambiguation:
    Strategy: "strategy role does not automatically activate Strategy pattern"
    Command: "command role does not automatically activate Command pattern"
    Repository: "repository role does not automatically require Repository pattern"
    Adapter: "adapter role requires interface mismatch to imply Adapter pattern"
    CQRS: "command/query roles do not automatically imply CQRS"
validation:
  fail_conditions:
    - "pattern_introduces_incompatible_role"
    - "pattern_selected_because_role_name_matches"
    - "pattern_violates_layer_or_dependency_rules"
    - "pattern_creates_structure_bloat"
