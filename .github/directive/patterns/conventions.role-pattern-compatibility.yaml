version: "1.0"
file:
  name: "conventions.role-pattern-compatibility.yaml"
  path: "patterns/conventions.role-pattern-compatibility.yaml"
  role: "role_pattern_compatibility_contract"
purpose: "Ensure selected patterns only introduce compatible roles."
ownership:
  owns:
    - "role_pattern_compatibility_policy"
    - "pattern_compatibility_by_role_family"
    - "pattern_introduced_roles_matrix"
    - "role_pattern_rejection_matrix"
    - "pattern_simpler_alternative_matrix"
    - "pattern_role_disambiguation"
  does_not_own:
    - "role_taxonomy"
    - "pattern_catalog"
    - "pattern_activation_gates"
    - "final_structure"
activation:
  mode: "conditional"
  activates_when:
    - "candidate_patterns_exist"
    - "selected_patterns_exist"
  skips_when: []
inputs:
  required:
    - "role_assignment_table"
    - "candidate_patterns"
    - "pattern_catalog"
  optional: []
outputs:
  produces:
    - "role_pattern_compatibility_report"
    - "compatible_patterns"
    - "introduced_roles"
dependencies:
  required_files:
    - "roles/conventions.role-taxonomy.yaml"
    - "patterns/conventions.pattern-catalog.yaml"
    - "patterns/conventions.pattern-selection.yaml"
    - "patterns/conventions.pattern-restrictions.yaml"
  optional_files: []
sections:
  role_pattern_compatibility_policy:
    default: "no_pattern"
    principles:
      - "Roles do not automatically imply patterns."
      - "Patterns may introduce roles only through compatibility rules."
      - "Patterns must preserve layer and dependency rules."
  pattern_introduced_roles_matrix:
    FactoryMethod:
      may_introduce:
        - "factory"
        - "interface"
      status: "active"
    AbstractFactory:
      may_introduce:
        - "factory"
        - "interface"
        - "provider"
      status: "active"
    Builder:
      may_introduce:
        - "builder"
      status: "active"
    Prototype:
      may_introduce:
        - "factory"
        - "builder"
      status: "active"
    Singleton:
      may_introduce:
        - "provider"
        - "config"
      status: "restricted"
    Adapter:
      may_introduce:
        - "adapter"
        - "port"
        - "client"
        - "mapper"
      status: "active"
    Bridge:
      may_introduce:
        - "interface"
        - "adapter"
        - "strategy"
      status: "restricted"
    Composite:
      may_introduce:
        - "interface"
        - "entity"
        - "value_object"
      status: "active"
    Decorator:
      may_introduce:
        - "interface"
        - "adapter"
        - "service"
      status: "active"
    Facade:
      may_introduce:
        - "service"
        - "adapter"
        - "orchestrator"
      status: "active"
    Flyweight:
      may_introduce:
        - "factory"
        - "registry"
        - "value_object"
      status: "restricted"
    Proxy:
      may_introduce:
        - "adapter"
        - "guard"
        - "service"
        - "provider"
      status: "active"
    ChainOfResponsibility:
      may_introduce:
        - "handler"
        - "registry"
        - "processor"
      status: "active"
    Command:
      may_introduce:
        - "command"
        - "handler"
        - "result"
      status: "active"
    Iterator:
      may_introduce:
        - "processor"
        - "interface"
      status: "active"
    Mediator:
      may_introduce:
        - "orchestrator"
        - "handler"
        - "publisher"
        - "listener"
      status: "active"
    Memento:
      may_introduce:
        - "value_object"
        - "record"
        - "repository"
      status: "active"
    Observer:
      may_introduce:
        - "domain_event"
        - "integration_event"
        - "publisher"
        - "listener"
        - "subscriber"
      status: "active"
    State:
      may_introduce:
        - "state"
        - "strategy"
        - "entity"
        - "invariant"
      status: "active"
    Strategy:
      may_introduce:
        - "strategy"
        - "selector"
        - "interface"
        - "registry"
      status: "active"
    TemplateMethod:
      may_introduce:
        - "service"
        - "strategy"
      status: "restricted"
    Visitor:
      may_introduce:
        - "interface"
      status: "restricted"
    DependencyInjection:
      may_introduce:
        - "provider"
        - "interface"
        - "port"
      status: "active"
    PortsAndAdapters:
      may_introduce:
        - "port"
        - "adapter"
        - "client"
        - "mapper"
      status: "active"
    CQRS:
      may_introduce:
        - "command"
        - "query"
        - "handler"
        - "read_model"
        - "projection"
      status: "conditional"
    Specification:
      may_introduce:
        - "specification"
      status: "active"
    DomainEvent:
      may_introduce:
        - "domain_event"
        - "publisher"
        - "listener"
      status: "active"
    Repository:
      may_introduce:
        - "repository"
        - "mapper"
      status: "active"
    DataMapper:
      may_introduce:
        - "mapper"
        - "record"
        - "model"
        - "entity"
        - "value_object"
      status: "active"
    UnitOfWork:
      may_introduce:
        - "unit_of_work"
        - "repository"
        - "transaction"
      status: "active"
    Projection:
      may_introduce:
        - "projection"
        - "read_model"
        - "domain_event"
        - "integration_event"
      status: "active"
    ReadModel:
      may_introduce:
        - "read_model"
        - "mapper"
      status: "active"
    EventSourcing:
      may_introduce:
        - "domain_event"
        - "repository"
        - "projection"
        - "read_model"
        - "processor"
        - "integration_event"
      status: "restricted"
    Outbox:
      may_introduce:
        - "integration_event"
        - "repository"
        - "transaction"
        - "producer"
        - "processor"
        - "job"
        - "record"
      status: "conditional"
    Inbox:
