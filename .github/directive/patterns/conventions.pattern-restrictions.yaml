version: '1.0'
file:
  name: conventions.pattern-restrictions.yaml
  path: patterns/conventions.pattern-restrictions.yaml
  role: pattern_restriction_contract
  executability: vocabulary
purpose: Define restricted, conditional, deferred, and disallowed pattern usage.
ownership:
  owns:
  - restricted_patterns
  - conditional_patterns
  - disallowed_patterns
  does_not_own:
  - pattern_catalog
activation:
  mode: always
  activates_when: []
  skips_when: []
inputs:
  required: []
  optional: []
outputs:
  produces:
  - pattern_restrictions_result
dependencies:
  required_files: []
  optional_files: []
sections:
  restricted_patterns:
  - Saga
  - CQRS
  - Outbox
  - UnitOfWork
  - ContractVersioning
  disallowed_patterns:
  - ServiceLocator
  deferred_to_contracts:
  - ContractVersioning
validation:
  fail_conditions:
  - id: PATTERNS-CONVENTIONS-PATTERN-RESTRICTIONS-YAML-FC-001
    condition: restricted_pattern_without_required_signal
    message: Restricted pattern without required signal.
    severity: error
    owner: patterns/conventions.pattern-restrictions.yaml
  - id: PATTERNS-CONVENTIONS-PATTERN-RESTRICTIONS-YAML-FC-002
    condition: ServiceLocator_allowed
    message: Servicelocator allowed.
    severity: error
    owner: patterns/conventions.pattern-restrictions.yaml
  required_checks: []
