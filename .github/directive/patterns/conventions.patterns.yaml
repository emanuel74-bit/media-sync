version: '1.0'
file:
  name: conventions.patterns.yaml
  path: patterns/conventions.patterns.yaml
  role: pattern_system_entrypoint
  executability: advisory_entrypoint
purpose: Entrypoint and execution order for pattern subsystem.
ownership:
  owns:
  - pattern_system_metadata
  - pattern_file_index
  - pattern_system_execution_order
  does_not_own:
  - pattern_definitions
  - selection_details
activation:
  mode: always
  activates_when: []
  skips_when: []
inputs:
  required: []
  optional: []
outputs:
  produces:
  - patterns_result
dependencies:
  required_files: []
  optional_files: []
sections:
  pattern_file_index:
    catalog: patterns/conventions.pattern-catalog.yaml
    selection: patterns/conventions.pattern-selection.yaml
    restrictions: patterns/conventions.pattern-restrictions.yaml
    compatibility: patterns/conventions.role-pattern-compatibility.yaml
  pattern_system_execution_order:
  - load_pattern_catalog
  - detect_pattern_pressure
  - select_patterns
  - validate_restrictions
  - validate_role_pattern_compatibility
validation:
  required_checks: []
  fail_conditions: []
