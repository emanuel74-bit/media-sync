version: "1.0"
file:
  name: "conventions.structure-strategy.yaml"
  path: "architecture/conventions.structure-strategy.yaml"
  role: "minimum_sufficient_structure_strategy_contract"
purpose: "Define minimum sufficient execution-flow-first structure strategy."
ownership:
  owns:
    - "minimum_sufficient_execution_flow_first_strategy"
    - "structure_density_modes"
    - "folder_creation_policy"
    - "dependency_order_policy"
    - "ownership_by_scope"
    - "role_grouping_policy"
  does_not_own:
    - "architecture_decomposition"
    - "role_definitions"
    - "dependency_direction_authority"
    - "final_file_tree_rendering"
activation:
  mode: "always"
  activates_when:
    - "physical structure must be rendered"
  skips_when: []
inputs:
  required:
    - "architecture_blueprint"
    - "role_assignment_table"
    - "role_placement_affinity_table"
  optional: []
outputs:
  produces:
    - "structure_strategy_decision"
    - "folder_creation_decisions"
    - "flattening_decisions"
dependencies:
  required_files:
    - "roles/conventions.role-placement.yaml"
  optional_files: []
sections:
  structure_policy:
    strategy: "minimum_sufficient_execution_flow_first"
    rule: "Feature/module first. Execution flow second. Flat when small. Role-family grouping when large. Dependency direction validated separately."
  structure_density_modes:
    compact:
      use_when:
        - "single execution flow"
        - "feature_file_count <= 5"
      rule: "Keep flat."
    flow:
      use_when:
        - "multiple execution flows"
      rule: "Create folders per execution flow."
    role_family_grouped:
      use_when:
        - "large module"
        - "repeated role families"
      rule: "Group by role family only when it improves navigation."
  folder_creation_policy:
    default: "do_not_create_folder_unless_justified"
    avoid_folder_when:
      - "folder_would_contain_one_file"
      - "folder_exists_only_because_role_exists"
      - "folder_depth_would_reduce_discoverability"
  dependency_order_policy:
    role: "validation_not_structure_driver"
    rules:
      - "Folders do not mirror dependency graph."
      - "Folder depth is not dependency authority."
  ownership_by_scope:
    module_level: "shared across flows"
    flow_level: "specific to one action"
    role_group_level: "organizational only"
validation:
  fail_conditions:
    - "folder_created_only_because_role_exists"
    - "single_file_folder_without_framework_reason"
    - "dependency_graph_mirrored_as_folder_tree"
    - "deep_nesting_for_theoretical_correctness"
