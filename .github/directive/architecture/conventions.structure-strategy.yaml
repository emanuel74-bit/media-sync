version: '1.0'
file:
  name: conventions.structure-strategy.yaml
  path: architecture/conventions.structure-strategy.yaml
  role: structure_strategy_contract
  executability: decision_engine
purpose: 'Define minimum-sufficient folder strategy: feature/module first, execution-flow second, flatten when small.'
ownership:
  owns:
  - structure_density_modes
  - folder_creation_policy
  - execution_flow_first_strategy
  does_not_own:
  - final_file_tree_rendering
activation:
  mode: always
  activates_when: []
  skips_when: []
inputs:
  required: []
  optional: []
outputs:
  produces:
  - structure_strategy_result
dependencies:
  required_files: []
  optional_files: []
sections:
  strategy:
    default: minimum_sufficient
    priority:
    - feature_or_module_first
    - execution_flow_second
    - flat_when_small
    - role_family_grouping_when_large
    avoid:
    - folder_bloat
    - theoretical_nesting
  folder_creation_thresholds:
    create_flow_folder_when:
    - multiple artifacts in same flow
    - flow has distinct behavior
    keep_flat_when:
    - few artifacts
    - readability improves
validation:
  fail_conditions:
  - id: ARCHITECTURE-CONVENTIONS-STRUCTURE-STRATEGY-YAML-FC-001
    condition: folder_created_without_threshold
    message: Folder created without threshold.
    severity: error
    owner: architecture/conventions.structure-strategy.yaml
  - id: ARCHITECTURE-CONVENTIONS-STRUCTURE-STRATEGY-YAML-FC-002
    condition: structure_bloat_detected
    message: Structure bloat detected.
    severity: error
    owner: architecture/conventions.structure-strategy.yaml
  required_checks: []
