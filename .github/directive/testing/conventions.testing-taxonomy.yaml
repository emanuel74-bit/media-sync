version: "1.0"
file:
  name: "conventions.testing-taxonomy.yaml"
  path: "testing/conventions.testing-taxonomy.yaml"
  role: "testing_role_taxonomy_contract"
purpose: "Define test artifact roles, test support roles, and verification support roles."
ownership:
  owns:
    - "testing_verification_taxonomy"
    - "behavior_test_roles"
    - "contract_test_roles"
    - "architecture_test_roles"
    - "test_support_roles"
    - "verification_support_roles"
  does_not_own:
    - "production_role_taxonomy"
    - "test_requirements_by_role"
    - "final_test_plan"
activation:
  mode: "conditional"
  activates_when:
    - "testing system is active"
  skips_when: []
inputs:
  required:
    - "role_taxonomy"
  optional: []
outputs:
  produces:
    - "testing_role_taxonomy"
dependencies:
  required_files:
    - "roles/conventions.role-taxonomy.yaml"
  optional_files: []
sections:
  testing_taxonomy_policy:
    rule: "Testing roles remain test-scoped."
  behavior_tests:
    - "unit_test"
    - "integration_test"
    - "e2e_test"
  contract_tests:
    - "contract_test"
    - "api_contract_test"
    - "event_contract_test"
  architecture_tests:
    - "architecture_test"
    - "boundary_test"
  test_support:
    - "mock"
    - "stub"
    - "fake"
    - "spy"
    - "fixture"
    - "test_factory"
    - "test_builder"
  verification_support:
    - "assertion"
    - "matcher"
  testing_role_definitions:
    unit_test:
      family: "testing_verification"
      suffix:
        - ".unit-test.ts"
        - ".unit.spec.ts"
      definition: "unit test role"
      choose_when:
        - "artifact responsibility matches role definition"
      reject_when:
        - "a more specific role applies"
        - "artifact has multiple responsibilities"
      must:
        - "own exactly one responsibility"
      forbidden:
        - "mixed responsibilities"
      status: "active"
    integration_test:
      family: "testing_verification"
      suffix:
        - ".integration-test.ts"
        - ".integration.spec.ts"
      definition: "integration test role"
      choose_when:
        - "artifact responsibility matches role definition"
      reject_when:
        - "a more specific role applies"
        - "artifact has multiple responsibilities"
      must:
        - "own exactly one responsibility"
      forbidden:
        - "mixed responsibilities"
      status: "active"
    e2e_test:
      family: "testing_verification"
      suffix:
        - ".e2e-test.ts"
        - ".e2e.spec.ts"
      definition: "e2e test role"
      choose_when:
        - "artifact responsibility matches role definition"
      reject_when:
        - "a more specific role applies"
        - "artifact has multiple responsibilities"
      must:
        - "own exactly one responsibility"
      forbidden:
        - "mixed responsibilities"
      status: "active"
    contract_test:
      family: "testing_verification"
      suffix: ".contract-test.ts"
      definition: "contract test role"
      choose_when:
        - "artifact responsibility matches role definition"
      reject_when:
        - "a more specific role applies"
        - "artifact has multiple responsibilities"
      must:
        - "own exactly one responsibility"
      forbidden:
        - "mixed responsibilities"
      status: "active"
    api_contract_test:
      family: "testing_verification"
      suffix: ".api-contract-test.ts"
      definition: "api contract test role"
      choose_when:
        - "artifact responsibility matches role definition"
      reject_when:
        - "a more specific role applies"
        - "artifact has multiple responsibilities"
      must:
        - "own exactly one responsibility"
      forbidden:
        - "mixed responsibilities"
      status: "active"
    event_contract_test:
      family: "testing_verification"
      suffix: ".event-contract-test.ts"
      definition: "event contract test role"
      choose_when:
        - "artifact responsibility matches role definition"
      reject_when:
        - "a more specific role applies"
        - "artifact has multiple responsibilities"
      must:
        - "own exactly one responsibility"
      forbidden:
