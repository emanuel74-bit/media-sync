version: '1.0'
file:
  name: conventions.testing-taxonomy.yaml
  path: testing/conventions.testing-taxonomy.yaml
  role: testing_taxonomy_contract
  executability: vocabulary
purpose: Define test role vocabulary and test types.
ownership:
  owns:
  - test_type_enum
  - test_role_definitions
  does_not_own:
  - test_derivation_matrix
activation:
  mode: always
  activates_when: []
  skips_when: []
inputs:
  required: []
  optional: []
outputs:
  produces:
  - testing_taxonomy_registry
dependencies:
  required_files: []
  optional_files: []
sections:
  test_type_enum:
    allowed:
    - unit
    - integration
    - contract
    - e2e
    - regression
    - characterization
    - migration
    - security
    - performance
    - snapshot
  test_role_definitions:
    unit: isolated logic test
    integration: multiple components or infrastructure boundary
    contract: contract compatibility test
    regression: preserve existing behavior after bugfix/refactor
    characterization: capture existing behavior before refactor
validation:
  fail_conditions:
  - id: TESTING-CONVENTIONS-TESTING-TAXONOMY-YAML-FC-001
    condition: unknown_test_type
    message: Unknown test type.
    severity: error
    owner: testing/conventions.testing-taxonomy.yaml
  required_checks: []
