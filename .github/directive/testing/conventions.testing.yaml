version: "1.0"
file:
  name: "conventions.testing.yaml"
  path: "testing/conventions.testing.yaml"
  role: "testing_system_entrypoint"
purpose: "Entrypoint and execution order for deriving tests from architecture, roles, and risk."
ownership:
  owns:
    - "testing_system_metadata"
    - "testing_file_index"
    - "testing_activation_rules"
    - "testing_execution_order"
  does_not_own:
    - "testing_role_details"
    - "test_matrix_details"
    - "production_role_definitions"
activation:
  mode: "entrypoint"
  activates_when:
    - "production_code_created_or_changed"
    - "refactor_requested"
    - "bugfix_requested"
  skips_when: []
inputs:
  required:
    - "role_assignment_table"
  optional: []
outputs:
  produces:
    - "testing_system_result"
    - "test_plan"
dependencies:
  required_files:
    - "testing/conventions.testing-taxonomy.yaml"
    - "testing/conventions.testing-matrix.yaml"
  optional_files: []
sections:
  testing_system_metadata:
    mode: "role_derived"
  testing_file_index:
    - "testing/conventions.testing-taxonomy.yaml"
    - "testing/conventions.testing-matrix.yaml"
  testing_activation_rules:
    - "production_code_created_or_changed"
    - "refactor_requested"
    - "bugfix_requested"
  testing_execution_order:
    - "load_testing_taxonomy"
    - "derive_test_requirements"
    - "validate_test_plan"
validation:
  fail_conditions:
    - "testing_subfile_missing"
    - "test_plan_missing_for_production_change"
