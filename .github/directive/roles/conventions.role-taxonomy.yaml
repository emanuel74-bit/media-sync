      suffix: ".use-case.ts"
      definition: "use case role"
      choose_when:
        - "artifact responsibility matches role definition"
      reject_when:
        - "a more specific role applies"
        - "artifact has multiple responsibilities"
      must:
        - "own exactly one responsibility"
      forbidden:
        - "mixed responsibilities"
      status: "active"
