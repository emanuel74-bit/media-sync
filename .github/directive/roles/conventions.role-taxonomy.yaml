  - role_enum
  - role_definitions
  - suffix_policy
  - role_detection_signals
  does_not_own:
  - role_resolution_process
  - role_collision_resolution
activation:
  mode: always
  activates_when: []
  skips_when: []
inputs:
  required: []
  optional: []
outputs:
