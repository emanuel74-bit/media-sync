version: "1.0"
file:
  name: "conventions.role-taxonomy.yaml"
  path: "roles/conventions.role-taxonomy.yaml"
  role: "role_vocabulary_contract"
purpose: "Define the accepted artifact role vocabulary."
ownership:
  owns:
    - "master_role_taxonomy"
    - "role_definition_schema"
    - "role_families"
    - "role_definitions"
    - "suffix_policy"
    - "deprecated_roles"
    - "discouraged_roles"
    - "restricted_roles"
  does_not_own:
    - "role_resolution_algorithm"
    - "role_collision_rules"
    - "physical_folder_strategy"
    - "pattern_selection"
activation:
  mode: "always"
  activates_when:
    - "artifact roles must be classified"
  skips_when: []
inputs:
  required:
    - "output_schema_registry"
  optional: []
outputs:
  produces:
    - "role_taxonomy"
    - "role_definition_registry"
    - "suffix_registry"
dependencies:
  required_files:
    - "core/conventions.output-schema.yaml"
  optional_files: []
sections:
  taxonomy_policy:
    principles:
      - "specific_role_before_generic_role"
      - "service_is_not_default"
      - "util_is_last_resort"
      - "domain_is_category_not_file_role"
      - "event_must_resolve_to_domain_event_or_integration_event"
  role_definition_schema:
    required_fields:
      - "family"
      - "suffix"
      - "definition"
      - "choose_when"
      - "reject_when"
      - "must"
      - "forbidden"
      - "status"
  master_role_taxonomy:
    structural_framework:
      - "module"
    transport_entry:
      - "controller"
      - "gateway"
      - "webhook"
    application_execution:
      - "use_case"
      - "command"
      - "query"
      - "handler"
      - "service"
      - "orchestrator"
      - "workflow"
      - "job"
      - "task"
      - "processor"
    domain_model:
      - "entity"
      - "value_object"
      - "aggregate"
      - "domain_service"
      - "domain_event"
    domain_constraint:
      - "rule"
      - "invariant"
    decision:
      - "policy"
      - "specification"
      - "guard"
      - "selector"
      - "strategy"
    transformation:
      - "mapper"
      - "normalizer"
      - "formatter"
      - "serializer"
      - "parser"
    transport_contract:
      - "dto"
      - "request"
      - "response"
    architectural_boundary:
      - "interface"
      - "port"
      - "contract"
    integration_boundary:
      - "client"
      - "adapter"
    integration_async:
      - "integration_event"
      - "listener"
      - "subscriber"
      - "consumer"
      - "producer"
      - "publisher"
      - "scheduler"
    persistence_data:
      - "repository"
      - "query_builder"
      - "schema"
      - "model"
      - "record"
      - "migration"
      - "seed"
      - "read_model"
      - "projection"
      - "transaction"
      - "unit_of_work"
    construction_resolution:
      - "factory"
      - "builder"
      - "provider"
      - "registry"
      - "resolver"
    error_result:
      - "error"
      - "exception"
      - "error_code"
      - "result"
    type_static:
      - "types"
      - "enum"
      - "constants"
      - "config"
    testing_verification:
      - "unit_test"
      - "integration_test"
      - "e2e_test"
      - "contract_test"
      - "api_contract_test"
      - "event_contract_test"
      - "architecture_test"
      - "boundary_test"
      - "mock"
      - "stub"
      - "fake"
      - "spy"
      - "fixture"
      - "test_factory"
      - "test_builder"
      - "assertion"
      - "matcher"
    fallback:
      - "util"
  role_definitions:
    module:
      family: "structural_framework"
      suffix: ".module.ts"
      definition: "module role"
      choose_when:
        - "artifact responsibility matches role definition"
      reject_when:
        - "a more specific role applies"
        - "artifact has multiple responsibilities"
      must:
        - "own exactly one responsibility"
      forbidden:
        - "mixed responsibilities"
      status: "active"
    controller:
      family: "transport_entry"
      suffix: ".controller.ts"
      definition: "controller role"
      choose_when:
