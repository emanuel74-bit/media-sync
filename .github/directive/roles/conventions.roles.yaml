version: '1.0'
file:
  name: conventions.roles.yaml
  path: roles/conventions.roles.yaml
  role: role_system_entrypoint
  executability: advisory_entrypoint
purpose: Entrypoint and execution order for role taxonomy, resolution, collision, and placement.
ownership:
  owns:
  - role_system_metadata
  - role_file_index
  - role_system_execution_order
  does_not_own:
  - role_definitions
  - role_resolution_details
activation:
  mode: always
  activates_when: []
  skips_when: []
inputs:
  required: []
  optional: []
outputs:
  produces:
  - roles_result
dependencies:
  required_files: []
  optional_files: []
sections:
  role_file_index:
    taxonomy: roles/conventions.role-taxonomy.yaml
    resolution: roles/conventions.role-resolution.yaml
    collisions: roles/conventions.role-collisions.yaml
    placement: roles/conventions.role-placement.yaml
  role_system_execution_order:
  - load_role_taxonomy
  - resolve_roles
  - resolve_collisions
  - apply_placement_affinity
  - produce_role_system_result
validation:
  required_checks: []
  fail_conditions: []
