version: "1.0"
file:
  name: "conventions.role-collisions.yaml"
  path: "roles/conventions.role-collisions.yaml"
  role: "role_ambiguity_resolution_contract"
purpose: "Resolve ambiguity when multiple roles appear valid."
ownership:
  owns:
    - "role_collision_rules"
    - "ambiguity_resolution_rules"
    - "split_triggers"
  does_not_own:
    - "role_taxonomy"
    - "role_detection_order"
    - "pattern_selection"
    - "structure_strategy"
activation:
  mode: "conditional"
  activates_when:
    - "multiple_roles_match"
    - "role_resolution_confidence < high"
  skips_when: []
inputs:
  required:
    - "unresolved_role_matches"
    - "role_taxonomy"
  optional: []
outputs:
  produces:
    - "resolved_role"
    - "split_required_items"
    - "collision_resolution_reason"
dependencies:
  required_files:
    - "roles/conventions.role-taxonomy.yaml"
    - "roles/conventions.role-resolution.yaml"
  optional_files: []
sections:
  collision_policy:
    mode: "fail_closed"
  collision_rule_index:
    application_execution:
      - "use_case_vs_command_query_handler"
      - "use_case_vs_service"
      - "service_vs_orchestrator"
      - "handler_vs_use_case"
      - "workflow_vs_orchestrator"
    domain_decision:
      - "validator_vs_guard"
      - "validator_vs_invariant"
      - "policy_vs_specification"
      - "policy_vs_guard"
      - "selector_vs_strategy"
      - "entity_vs_value_object"
      - "entity_vs_aggregate"
      - "domain_service_vs_application_service"
    transformation_boundary:
      - "mapper_vs_adapter"
      - "mapper_vs_normalizer"
      - "mapper_vs_formatter"
      - "serializer_vs_mapper"
      - "parser_vs_mapper"
      - "dto_vs_request"
      - "dto_vs_response"
      - "interface_vs_port"
      - "interface_vs_contract"
      - "port_vs_contract"
      - "client_vs_adapter"
    integration_async:
      - "domain_event_vs_integration_event"
      - "listener_vs_subscriber"
      - "subscriber_vs_consumer"
      - "publisher_vs_producer"
      - "webhook_vs_controller"
      - "webhook_vs_consumer"
      - "scheduler_vs_job"
      - "job_vs_task"
      - "job_vs_processor"
      - "processor_vs_consumer"
      - "listener_vs_handler"
    persistence_data:
      - "repository_vs_service"
      - "repository_vs_query_builder"
      - "schema_vs_model"
      - "model_vs_record"
      - "record_vs_entity"
      - "model_vs_entity"
      - "read_model_vs_response"
      - "read_model_vs_projection"
      - "migration_vs_seed"
      - "transaction_vs_unit_of_work"
      - "query_builder_vs_specification"
    construction_resolution:
      - "factory_vs_builder"
      - "factory_vs_resolver"
      - "factory_vs_provider"
      - "registry_vs_resolver"
      - "resolver_vs_selector"
      - "selector_vs_strategy"
      - "strategy_vs_policy"
      - "provider_vs_service"
      - "registry_vs_factory"
      - "resolver_vs_guard"
    error_result_type_static:
      - "error_vs_exception"
      - "error_vs_error_code"
      - "exception_vs_error_code"
      - "result_vs_response"
      - "result_vs_error"
      - "types_vs_interface"
      - "types_vs_contract"
      - "enum_vs_error_code"
      - "enum_vs_constants"
      - "constants_vs_config"
      - "constants_vs_rule"
      - "config_vs_provider"
    testing_verification:
      - "unit_test_vs_integration_test"
      - "integration_test_vs_e2e_test"
      - "contract_test_vs_integration_test"
      - "api_contract_test_vs_e2e_test"
      - "event_contract_test_vs_listener_unit_test"
      - "architecture_test_vs_boundary_test"
      - "mock_vs_stub"
      - "stub_vs_fake"
      - "fake_vs_integration_test"
      - "fixture_vs_test_factory"
      - "test_factory_vs_test_builder"
      - "assertion_vs_matcher"
  collision_rules:
    application_execution:
      use_case_vs_command_query_handler:
        choose_use_case_when:
          - "use_case responsibility is primary"
        choose_command_query_handler_when:
          - "command_query_handler responsibility is primary"
        fail_when:
          - "both responsibilities are primary and cannot be separated"
      use_case_vs_service:
        choose_use_case_when:
          - "use_case responsibility is primary"
        choose_service_when:
          - "service responsibility is primary"
        fail_when:
          - "both responsibilities are primary and cannot be separated"
      service_vs_orchestrator:
        choose_service_when:
          - "service responsibility is primary"
        choose_orchestrator_when:
          - "orchestrator responsibility is primary"
        fail_when:
          - "both responsibilities are primary and cannot be separated"
      handler_vs_use_case:
        choose_handler_when:
          - "handler responsibility is primary"
        choose_use_case_when:
