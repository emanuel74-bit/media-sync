version: '1.0'
file:
  name: conventions.role-collisions.yaml
  path: roles/conventions.role-collisions.yaml
  role: role_collision_contract
  executability: vocabulary
purpose: Resolve ambiguity when multiple roles appear to apply.
ownership:
  owns:
  - role_collision_rules
  - decomposition_triggers
  - collision_report_schema
  does_not_own:
  - role_taxonomy
activation:
  mode: always
  activates_when: []
  skips_when: []
inputs:
  required: []
  optional: []
outputs:
  produces:
  - role_collisions_result
dependencies:
  required_files: []
  optional_files: []
sections:
  collision_policy: fail_closed_or_decompose
  collision_rules:
    controller_vs_webhook: webhook is external callback entrypoint; controller is request/response transport entrypoint
    service_vs_use_case: use_case for one business action; service for reusable side-effect orchestration
    policy_vs_strategy: policy encodes decision rule; strategy encodes interchangeable algorithm
validation:
  fail_conditions:
  - id: ROLES-CONVENTIONS-ROLE-COLLISIONS-YAML-FC-001
    condition: unresolved_role_collision
    message: Unresolved role collision.
    severity: error
    owner: roles/conventions.role-collisions.yaml
  - id: ROLES-CONVENTIONS-ROLE-COLLISIONS-YAML-FC-002
    condition: multi_role_artifact_kept_without_split
    message: Multi role artifact kept without split.
    severity: error
    owner: roles/conventions.role-collisions.yaml
  required_checks: []
