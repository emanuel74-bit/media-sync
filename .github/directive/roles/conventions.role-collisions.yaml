        choose_invariant_when:
          - "invariant responsibility is primary"
        fail_when:
          - "both responsibilities are primary and cannot be separated"
      policy_vs_specification:
        choose_policy_when:
          - "policy responsibility is primary"
        choose_specification_when:
          - "specification responsibility is primary"
        fail_when:
          - "both responsibilities are primary and cannot be separated"
      policy_vs_guard:
        choose_policy_when:
          - "policy responsibility is primary"
        choose_guard_when:
          - "guard responsibility is primary"
        fail_when:
          - "both responsibilities are primary and cannot be separated"
      selector_vs_strategy:
        choose_selector_when:
          - "selector responsibility is primary"
        choose_strategy_when:
          - "strategy responsibility is primary"
        fail_when:
          - "both responsibilities are primary and cannot be separated"
      entity_vs_value_object:
