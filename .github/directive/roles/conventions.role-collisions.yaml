        fail_when:
          - "both responsibilities are primary and cannot be separated"
      workflow_vs_orchestrator:
        choose_workflow_when:
          - "workflow responsibility is primary"
        choose_orchestrator_when:
          - "orchestrator responsibility is primary"
        fail_when:
          - "both responsibilities are primary and cannot be separated"
    domain_decision:
      validator_vs_guard:
        choose_validator_when:
          - "validator responsibility is primary"
        choose_guard_when:
          - "guard responsibility is primary"
        fail_when:
          - "both responsibilities are primary and cannot be separated"
      validator_vs_invariant:
