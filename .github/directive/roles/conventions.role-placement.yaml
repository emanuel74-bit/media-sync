version: "1.0"
file:
  name: "conventions.role-placement.yaml"
  path: "roles/conventions.role-placement.yaml"
  role: "role_layer_and_placement_affinity_contract"
purpose: "Provide advisory layer, suffix, and placement affinities without forcing folders."
ownership:
  owns:
    - "layer_affinity_by_role_family"
    - "placement_affinity_by_role"
    - "suffix_lookup"
    - "placement_authority_rules"
  does_not_own:
    - "final_folder_structure"
    - "structure_density_modes"
    - "architecture_layer_assignment"
    - "dependency_direction_rules"
activation:
  mode: "always"
  activates_when:
    - "roles are assigned"
  skips_when: []
inputs:
  required:
    - "role_assignment_table"
    - "role_taxonomy"
  optional: []
outputs:
  produces:
    - "role_layer_affinity_table"
    - "role_placement_affinity_table"
    - "suffix_lookup_table"
dependencies:
  required_files:
    - "roles/conventions.role-taxonomy.yaml"
  optional_files: []
sections:
  placement_policy:
    authority: "advisory_default"
    rules:
      - "Role placement suggests; structure strategy decides."
      - "A role does not automatically create a folder."
      - "Architecture remains source of truth for layer assignment."
  layer_affinity_by_role_family:
    transport:
      - "controller"
      - "gateway"
      - "webhook"
    application:
      - "use_case"
      - "command"
      - "query"
      - "handler"
      - "service"
      - "orchestrator"
      - "workflow"
      - "job"
      - "task"
      - "processor"
      - "selector"
      - "strategy"
      - "listener"
      - "publisher"
      - "projection"
      - "read_model"
    domain:
      - "entity"
      - "value_object"
      - "aggregate"
      - "domain_service"
      - "domain_event"
      - "rule"
      - "invariant"
      - "policy"
      - "specification"
    infrastructure:
      - "repository"
      - "query_builder"
      - "schema"
      - "model"
      - "record"
      - "migration"
      - "seed"
      - "read_model"
      - "projection"
      - "transaction"
      - "unit_of_work"
      - "client"
      - "adapter"
      - "consumer"
      - "producer"
      - "subscriber"
      - "scheduler"
    boundary_or_shared:
