version: '1.0'
file:
  name: conventions.role-placement.yaml
  path: roles/conventions.role-placement.yaml
  role: role_placement_affinity_contract
  executability: vocabulary
purpose: Define advisory layer and folder placement affinity for resolved roles.
ownership:
  owns:
  - role_layer_affinity
  - placement_affinity
  - boundary_affinity
  does_not_own:
  - final_structure_rendering
activation:
  mode: always
  activates_when: []
  skips_when: []
inputs:
  required: []
  optional: []
outputs:
  produces:
  - role_placement_result
dependencies:
  required_files:
  - roles/conventions.role-taxonomy.yaml
  - boundaries/conventions.boundary-taxonomy.yaml
  - dependencies/conventions.dependency-taxonomy.yaml
  optional_files: []
sections:
  layer_affinity:
    transport:
    - controller
    - gateway
    - webhook
    application:
    - use_case
    - handler
    - command
    - query
    - orchestrator
    - workflow
    - service
    domain:
    - entity
    - aggregate
    - value_object
    - policy
    - rule
    - specification
    - invariant
    - domain_service
    - domain_event
    infrastructure:
    - repository
    - adapter
    - client
    - provider
    - migration
    - schema
    - model
    - record
    testing:
    - fixture
    - fake
    - mock
    - stub
    - spy
    - test_factory
validation:
  fail_conditions:
  - id: ROLES-CONVENTIONS-ROLE-PLACEMENT-YAML-FC-001
    condition: role_placed_in_forbidden_layer
    message: Role placed in forbidden layer.
    severity: error
    owner: roles/conventions.role-placement.yaml
  - id: ROLES-CONVENTIONS-ROLE-PLACEMENT-YAML-FC-002
    condition: placement_affinity_used_as_absolute_rule_without_architecture
    message: Placement affinity used as absolute rule without architecture.
    severity: error
    owner: roles/conventions.role-placement.yaml
  required_checks: []
