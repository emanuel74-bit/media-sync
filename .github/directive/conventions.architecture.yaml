architecture_rules:
    version: "3.0"
    purpose: "Strict, agent-enforceable architecture contract combining intent-based decomposition, clean architecture, and service symmetry enforcement"

    rule_priority:
        ABSOLUTE:
            description: "Hard constraints. Must never be violated."
        STRUCTURAL:
            description: "Defines system boundaries, layers, and dependency topology."
        BEHAVIORAL:
            description: "Rules governing service usage, consistency, and design behavior."
        ENFORCEMENT:
            description: "Runtime/static validation rules and checkpoints."

    # =========================================================
    # 1. LOGIC DECOMPOSITION SYSTEM
    # =========================================================

    logic_decomposition:
        description: "All logic MUST be decomposed into intent-based units before architecture assignment"

        stages:
            - intent_classification
            - intent_to_artifact_mapping
            - layer_assignment

        intents:
            EXECUTE_ACTION:
                maps_to: [use_case]
                definition: "Single business action: one input → one outcome"

            COORDINATE_WORKFLOW:
                maps_to: [service, orchestrator]
                definition: "Multi-step coordination across components"

            DECIDE:
                maps_to: [policy, specification, guard, selector]
                definition: "Pure decision logic without side effects"

            TRANSFORM_DATA:
                maps_to: [mapper, formatter, normalizer]
                definition: "Pure deterministic transformation"

            ACCESS_DATA:
                maps_to: [repository, client]
                definition: "External IO or persistence access"

            CONSTRUCT_OBJECT:
                maps_to: [factory, builder]

            VALIDATE:
                maps_to: [validator]

            RESOLVE:
                maps_to: [resolver, strategy]

        constraints:
            - "One unit MUST implement exactly one intent"
            - "Intent mixing requires decomposition"
            - "Decision logic MUST NOT exist inside execution units"
            - "Transformation logic MUST NOT exist inside services/use-cases"

    # =========================================================
    # 2. MODULE STRUCTURE (FEATURE-BASED PRIMARY ORGANIZATION)
    # =========================================================

    module_structure:
        principle: "Feature-first organization with strict internal layering"

        rules:
            - "Each module represents a single business capability"
            - "Modules must be independently understandable and testable"
            - "Prefer feature-based grouping over technical grouping"
            - "Cross-module dependency must be explicit and minimal"

    # =========================================================
    # 3. LAYERS (STRICT CLEAN ARCHITECTURE + INTENT ALIGNMENT)
    # =========================================================

    layers:
        ENTRY:
            components: [controller, gateway]
            responsibility: "External input boundary"
            constraints:
                - "NO business logic allowed"
                - "ONLY delegates to APPLICATION"
                - "NO direct DOMAIN or INFRASTRUCTURE access"

        APPLICATION:
            components: [service, use_case, orchestrator]
            responsibility: "Workflow orchestration"
            constraints:
                - "Orchestrates but does NOT define business rules"
                - "Must NOT contain decision logic (DECIDE intent)"
                - "Uses DOMAIN + DECISION + INFRASTRUCTURE via DI"

        DOMAIN:
            components: [domain, event, listener, publisher]
            responsibility: "Core business invariants"
            constraints:
                - "Pure, framework-free"
                - "No dependency on APPLICATION or INFRASTRUCTURE"
                - "Enforces invariants internally"

        DECISION:
            components: [policy, specification, guard, selector]
            responsibility: "Pure deterministic decision logic"
            constraints:
                - "No mutation"
                - "No IO"
                - "Only DOMAIN dependencies allowed"

        INFRASTRUCTURE:
            components: [repository, client, adapter, logger_module]
            responsibility: "External systems integration"
            constraints:
                - "NO business logic"
                - "Implements APPLICATION-defined interfaces"
                - "Cannot influence domain rules"

        SUPPORT:
            TRANSFORMATION: [mapper, formatter, normalizer]
            CONSTRUCTION: [factory, builder]
            VALIDATION: [validator]
            RESOLUTION: [resolver, strategy]
            TYPES: [dto, types]
            CONFIG: [config, const, enum]

            constraints:
                - "Must be stateless unless explicitly required"
                - "No orchestration logic allowed"

    # =========================================================
    # 4. DEPENDENCY FLOW (STRICT DAG)
    # =========================================================

    dependency_flow:
        type: strict_dag
        order: [ENTRY, APPLICATION, DECISION, DOMAIN, INFRASTRUCTURE]

        rules:
            - "Dependencies only point downward"
            - "No circular dependencies"
            - "No layer skipping"

        allowed_access:
            ENTRY: [APPLICATION]
            APPLICATION: [DOMAIN, DECISION, INFRASTRUCTURE]
            DECISION: [DOMAIN]
            DOMAIN: []
            INFRASTRUCTURE: []

    # =========================================================
    # 5. DEPENDENCY INJECTION RULES
    # =========================================================

    dependency_injection:
        model: application_boundary_di

        rules:
            - "APPLICATION defines all external interfaces"
            - "INFRASTRUCTURE implements APPLICATION interfaces"
            - "DOMAIN never receives external dependencies"
            - "ENTRY is the composition root"

        forbidden:
            - direct_infrastructure_in_domain
            - direct_infrastructure_in_decision
            - manual instantiation of external clients in services

    # =========================================================
    # 6. SERVICE BEHAVIOR MODEL (NEW: STRICT CONSISTENCY CONTRACT)
    # =========================================================

    service_model:
        principle: "Services are intent execution units, not role containers"

        rules:
            - "Each service MUST implement exactly ONE intent"
            - "No mixed-intent services allowed"
            - "Services must be stateless"
            - "Services are behavior-first, not layer-first"

    service_usage_consistency:
        principle: "All service usage must be symmetric and deterministic"

        rules:
            - "Same service MUST be called consistently across all modules"
            - "Same operation MUST use identical input structure everywhere"
            - "Same operation MUST return consistent output shape"
            - "No duplicate implementations of existing service logic"

        forbidden:
            - inconsistent_service_signatures
            - bypassing_service_in_some_modules
            - reimplementing_service_logic_locally
            - multiple_entrypoints_for_same_operation

        enforcement:
            - "If inconsistency exists → refactor to single contract"
            - "Adapters allowed ONLY for external system compatibility"

    # =========================================================
    # 7. ERROR HANDLING
    # =========================================================

    error_handling:
        required_on: [service, use_case, orchestrator]
        strategy_field: ERROR_STRATEGY

        strategies:
            HANDLE:
                behavior: [catch_known_errors, transform_to_domain_errors]
            PROPAGATE:
                behavior: [no_catch]
            HYBRID:
                behavior: [catch_expected_only, propagate_unexpected]

        constraints:
            - "Must explicitly declare strategy"
            - "No hidden defaults"
            - "No retry logic in APPLICATION"

    # =========================================================
    # 8. LOGGING SYSTEM
    # =========================================================

    logging:
        model: dependency_injected_logger

        constraints:
            - "No console.log allowed"
            - "All logging via injected logger"
            - "Logger available in all layers"

    # =========================================================
    # 9. VALIDATION CHECKPOINTS
    # =========================================================

    validation_checkpoints:
        after_decomposition:
            - single_intent_validation
            - correct_artifact_mapping

        after_service_creation:
            - layer_compliance
            - error_strategy_present

        after_dependency_changes:
            - dag_validation
            - no_layer_skipping

        after_integration:
            - di_compliance
            - boundary_isolation

    # =========================================================
    # 10. ANTI-PATTERNS (EXPANDED FROM MD FILE)
    # =========================================================

    anti_patterns:
        absolute:
            - circular_dependencies
            - layer_skipping
            - global_mutable_state
            - business_logic_in_infrastructure
            - decision_logic_in_infrastructure
            - infrastructure_leaks_into_domain
            - mixed_intent_services
            - inconsistent_service_usage
            - duplicate_service_logic
            - god_services
            - fat_services
            - conditional_heavy_business_logic

    # =========================================================
    # 11. OUTPUT CONTRACT (NEW FROM MD FILE)
    # =========================================================

    output_contract:
        rules:
            - "Must produce production-grade architecture"
            - "No pseudo-code allowed"
            - "No explanations in final output"
            - "All layers must be respected"
            - "Service consistency must be enforced"
            - "All inconsistencies must be eliminated"
