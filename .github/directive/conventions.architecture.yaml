architecture_rules:
    version: "2.0"
    purpose: "Strict, agent-enforceable layered architecture with intent-based decomposition and deterministic dependency rules"

    rule_priority:
        ABSOLUTE:
            description: "Hard constraints. Must never be violated."
        STRUCTURAL:
            description: "Defines system boundaries, layers, and dependency topology."
        ENFORCEMENT:
            description: "Runtime/static validation rules and checkpoints."

    # =========================================================
    # 1. LOGIC DECOMPOSITION SYSTEM (PRE-LAYER ASSIGNMENT RULE)
    # =========================================================

    logic_decomposition:
        description: "All business logic MUST be decomposed into intent-based units BEFORE assigning files or layers"

        stages:
            - name: intent_classification
              rule: "Every logic block MUST be classified into exactly one intent type"

            - name: intent_to_artifact_mapping
              rule: "Each intent MUST map to exactly one artifact type"

            - name: layer_assignment
              rule: "Layer is assigned only after decomposition"

        intents:
            EXECUTE_ACTION:
                maps_to:
                    - use_case
                definition: "Single business action: one input → one outcome"

            COORDINATE_WORKFLOW:
                maps_to:
                    - service
                    - orchestrator
                definition: "Multi-step coordination across components"

            DECIDE:
                maps_to:
                    - policy
                    - specification
                    - guard
                    - selector
                definition: "Pure decision logic without side effects"

            TRANSFORM_DATA:
                maps_to:
                    - mapper
                    - formatter
                    - normalizer
                definition: "Pure deterministic transformation"

            ACCESS_DATA:
                maps_to:
                    - repository
                    - client
                definition: "Data retrieval or persistence or external IO"

            CONSTRUCT_OBJECT:
                maps_to:
                    - factory
                    - builder
                definition: "Controlled object creation"

            VALIDATE:
                maps_to:
                    - validator
                definition: "Validation only, no mutation"

            RESOLVE:
                maps_to:
                    - resolver
                    - strategy
                definition: "Runtime selection of implementation"

        decomposition_constraints:
            - "A single unit MUST NOT implement multiple intents"
            - "If multiple intents exist → MUST split into separate artifacts"
            - "Decision logic MUST NOT exist inside execution units"
            - "Transformation logic MUST NOT exist inside services or use-cases"

    # =========================================================
    # 2. LAYERS (STRUCTURAL ONLY - NO ROLE MIXING)
    # =========================================================

    layers:
        ENTRY:
            components:
                - controller
                - gateway
            responsibility: "External input boundary"
            constraints:
                - "MUST NOT contain business logic"
                - "MUST only delegate to APPLICATION layer"
                - "MUST NOT access DOMAIN or INFRASTRUCTURE directly"

        APPLICATION:
            components:
                - service
                - use_case
                - orchestrator
            responsibility: "Business execution and workflow coordination"
            constraints:
                - "MUST orchestrate but NOT define domain rules"
                - "MUST use DECISION + DOMAIN + INFRASTRUCTURE via DI"
                - "MUST respect ERROR_STRATEGY per unit"

        DOMAIN:
            components:
                - domain
                - event
                - listener
                - publisher
            responsibility: "Core business model and invariants"
            constraints:
                - "MUST be pure and infrastructure-free"
                - "MUST NOT depend on APPLICATION or INFRASTRUCTURE"
                - "MUST enforce invariants internally"

        DECISION:
            components:
                - policy
                - specification
                - guard
                - selector
            responsibility: "Pure decision evaluation"
            constraints:
                - "MUST NOT mutate state"
                - "MUST NOT perform IO"
                - "MUST depend only on DOMAIN types"

        INFRASTRUCTURE:
            components:
                - client
                - repository
                - adapter
                - logger_module
            responsibility: "External systems and persistence"
            constraints:
                - "MUST NOT contain business logic"
                - "MUST only implement interfaces defined above"
                - "MUST NOT influence domain rules"

        SUPPORT:
            TRANSFORMATION:
                - mapper
                - formatter
                - normalizer

            CONSTRUCTION:
                - factory
                - builder

            VALIDATION:
                - validator

            RESOLUTION:
                - resolver
                - strategy

            TYPES:
                - types
                - dto

            CONFIG:
                - config
                - const
                - enum

            constraints:
                - "MUST be stateless unless explicitly defined"
                - "MUST NOT contain orchestration logic"

    # =========================================================
    # 3. DEPENDENCY FLOW (STRICT DAG)
    # =========================================================

    dependency_flow:
        type: strict_dag

        order:
            - ENTRY
            - APPLICATION
            - DECISION
            - DOMAIN
            - INFRASTRUCTURE

        rules:
            - "Dependencies MUST only point downward"
            - "No upward dependency allowed"
            - "No skipping layers"
            - "No circular dependencies"

        allowed_access:
            ENTRY:
                can_access:
                    - APPLICATION

            APPLICATION:
                can_access:
                    - DOMAIN
                    - DECISION
                    - INFRASTRUCTURE (via interfaces)

            DECISION:
                can_access:
                    - DOMAIN

            DOMAIN:
                can_access: []

            INFRASTRUCTURE:
                can_access: []

    # =========================================================
    # 4. DEPENDENCY INJECTION (DI RULES)
    # =========================================================

    dependency_injection:
        model: "application_boundary_di"

        rules:
            - "APPLICATION layer MUST define interfaces for external dependencies"
            - "INFRASTRUCTURE MUST implement APPLICATION-defined interfaces"
            - "DOMAIN MUST NOT receive infrastructure dependencies"
            - "ENTRY layer acts as composition root"

        forbidden:
            - "direct infrastructure imports in DOMAIN"
            - "direct infrastructure imports in DECISION"
            - "service instantiating concrete clients/repositories directly"

    # =========================================================
    # 5. SEPARATION RULES (ANTI-MIXING CONSTRAINTS)
    # =========================================================

    separation_rules:
        ABSOLUTE:
            - rule: "ENTRY layer MUST NOT contain business logic"
              detect:
                  forbidden:
                      - business_logic_in_controller
                      - business_logic_in_gateway

            - rule: "DOMAIN MUST NOT contain infrastructure logic"
              detect:
                  forbidden:
                      - http_calls
                      - db_queries
                      - sdk_usage

            - rule: "DECISION layer MUST NOT mutate state"
              detect:
                  forbidden:
                      - assignments
                      - persistence_calls

            - rule: "APPLICATION layer MUST NOT embed decision logic"
              detect:
                  forbidden:
                      - inline_business_rules
                      - duplicated_policy_logic

            - rule: "No intent mixing inside a single artifact"
              detect:
                  forbidden_combinations:
                      - execution + decision
                      - transformation + business_logic
                      - validation + mutation
                      - orchestration + domain_rules

    # =========================================================
    # 6. SERVICE BEHAVIOR MODEL (NO ROLE ASSIGNMENT INSIDE SERVICES)
    # =========================================================

    service_model:
        principle: "Services are outputs of decomposition, not role containers"

        rules:
            - "A service MUST implement only ONE intent type"
            - "Intent mixing requires splitting into multiple artifacts"
            - "Services are classified by behavior, not declared role metadata"

    # =========================================================
    # 7. ERROR HANDLING SYSTEM
    # =========================================================

    error_handling:
        required_on:
            - service
            - use_case
            - orchestrator

        strategy_field: "ERROR_STRATEGY"

        strategies:
            HANDLE:
                behavior:
                    - catch_known_errors
                    - transform_to_domain_errors
                    - optional_recovery
                forbidden:
                    - raw_infrastructure_error_leak

            PROPAGATE:
                behavior:
                    - no_catch
                    - bubble_up

            HYBRID:
                behavior:
                    - catch_expected_only
                    - propagate_unexpected

        constraints:
            - "ERROR_STRATEGY MUST be explicitly declared"
            - "No implicit default allowed"
            - "No retry logic in APPLICATION layer"

    # =========================================================
    # 8. LOGGING SYSTEM (INJECTABLE CENTRAL LOGGER)
    # =========================================================

    logging:
        model: "dependency_injected_central_logger"

        logger_module:
            type: "shared_injected_service"
            rule: "Logger is defined in a module and injected everywhere"

        constraints:
            - "console.log is forbidden"
            - "logging MUST use injected logger only"
            - "logging allowed in all layers via DI"

        log_schema:
            model: "hybrid"

            mandatory_fields:
                traceability:
                    - traceId

                origin:
                    - serviceName OR moduleName
                    - layer
                    - operationName

                event:
                    - logLevel
                    - eventType

                temporal:
                    - timestamp

            optional_fields:
                identity:
                    - userId
                    - systemActor
                    - tenantId

                observability:
                    - requestId
                    - correlationId
                    - sessionId

                analytics:
                    - durationMs
                    - payloadSummary
                    - errorCode

            validation_rules:
                invalid_if_missing_any:
                    - traceId
                    - logLevel
                    - eventType
                    - timestamp
                    - operationName
                    - layer
                    - (serviceName AND moduleName both missing)

    # =========================================================
    # 9. VALIDATION CHECKPOINTS
    # =========================================================

    validation_checkpoints:
        after_logic_decomposition:
            - verify_single_intent_per_unit
            - verify_correct_artifact_mapping

        after_service_creation:
            - verify_layer_assignment
            - verify_error_strategy_declared

        after_dependency_changes:
            - verify_dependency_flow
            - verify_no_layer_skipping

        after_integration:
            - verify_di_compliance
            - verify_infrastructure_boundary

    # =========================================================
    # 10. FORBIDDEN SYSTEM STATES
    # =========================================================

    forbidden:
        ABSOLUTE:
            - circular_dependencies
            - layer_skipping
            - global_mutable_state
            - business_logic_in_infrastructure
            - decision_logic_in_infrastructure
            - infrastructure_logic_in_domain
            - untyped_business_boundaries
