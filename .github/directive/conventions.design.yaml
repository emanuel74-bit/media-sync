version: "1.1"

system:
    name: "feature-to-architecture-compiler"
    purpose: >
        Convert a raw feature/system prompt into a fully decomposed,
        role-assigned, structure-validated architecture blueprint.

    philosophy:
        - "No structure before decomposition"
        - "No pattern before roles are validated"
        - "No file assignment before intent is stable"
        - "Architecture emerges, it is not chosen prematurely"
        - "Folder structure and runtime architecture must converge"
        - "Fail closed on ambiguity at every stage"

# =========================================================
# 1. EXTERNAL SYSTEM DEPENDENCIES (NO MERGING)
# =========================================================

dependencies:
    architecture_rules:
        file: "conventions.architecture.yaml"
        role: "primary structural and decomposition system"

    role_classifier:
        file: "conventions.roles.yaml"
        role: "class-level responsibility validator"

    design_patterns:
        file: "conventions.design.patterns.yaml"
        role: "interaction + structural pattern selector"

    architecture_contract_v3:
        file: "conventions.structure.yaml"
        role: "structural hierarchy + folder + module enforcement system"
        usage: "validates folder structure, isolation, and execution constraints"

# =========================================================
# 2. PIPELINE (STRICT ORDER - NO SKIPPING)
# =========================================================

execution_pipeline:
    - stage: 1_raw_intent_extraction
      description: "Extract atomic functional intents from feature prompt"
      uses:
          - architecture_rules.logic_decomposition.intents

    - stage: 2_system_decomposition
      description: >
          Break feature into atomic units before any structural assumptions
      rules:
          - "no roles"
          - "no patterns"
          - "no folder structure"

    - stage: 3_layer_and_hierarchy_classification
      description: >
          Assign architectural depth + layer based on contract v3
      uses:
          - architecture_contract_v3.hierarchy_model
          - architecture_contract_v3.classification_rules
          - architecture_rules.layers

    - stage: 4_class_role_assignment
      description: "Assign strict single responsibility roles"
      uses:
          - role_classifier
      constraints:
          - "1 unit → 1 role only"

    - stage: 5_pattern_selection
      description: "Select patterns ONLY after role stability"
      uses:
          - design_patterns.design_pattern_decision_engine
      constraints:
          - "pattern must not violate role constraints"

    - stage: 6_folder_and_module_binding
      description: >
          Map architecture into folder structure using contract v3 rules
      uses:
          - architecture_contract_v3.feature_module_model
          - architecture_contract_v3.folder_rules
          - architecture_contract_v3.file_rules
          - architecture_contract_v3.barrel_exports
          - architecture_contract_v3.public_api_model

    - stage: 7_architecture_binding
      description: >
          Bind roles, layers, patterns, and folder structure into DAG
      output: "architecture graph (DAG)"

    - stage: 8_validation
      description: >
          Full validation across BOTH systems (logic + structure)
      uses:
          - architecture_rules.validation_checkpoints
          - architecture_rules.forbidden
          - architecture_contract_v3.evaluation_order
          - architecture_contract_v3.violation_engine

# =========================================================
# 3. STRUCTURE + HIERARCHY RULES (NEW CORE INTEGRATION)
# =========================================================

structure_model:
    hierarchy_model:
        depth_1: "root_feature"
        depth_2: "use_case_flow"
        depth_3_plus: "sub_use_case_flow"

    variant_model:
        definition: "execution-path divergence under same use-case"
        rule: "variants must not change domain intent"

# =========================================================
# 4. DECOMPOSITION RULES (ENHANCED)
# =========================================================

decomposition_rules:
    atomicity:
        rule: "one intent per unit"

    no_mixing:
        forbidden:
            - execution + decision
            - domain + infrastructure
            - validation + mutation
            - orchestration + IO

    split_condition:
        trigger: "any ambiguity or mixed responsibility"
        action: "force decomposition restart"

# =========================================================
# 5. LAYER + DOMAIN CONSTRAINTS (CONTRACT V3 INTEGRATION)
# =========================================================

layer_constraints:
    domain:
        must_not:
            - infrastructure_logic
            - framework imports
            - side effects

    services:
        rule: "use-case orchestration only"
        must_not:
            - infrastructure logic leakage

    repositories:
        rule: "pure persistence abstraction"

    controllers:
        rule: "transport only"

    infrastructure:
        rule: "ALL IO isolated here"
        enforcement: "hard boundary"

# =========================================================
# 6. FOLDER + FILE SYSTEM RULES (STRICT MERGE)
# =========================================================

folder_system:
    rules:
        single_purpose: true
        no_generic_names: ["utils", "helpers", "common"]

    required_structure_for_root_feature:
        - controllers
        - services
        - domain
        - repositories
        - dto
        - mappers

file_rules:
    single_responsibility: true
    single_export: true
    naming: "behavior-based naming required"
    size_constraint: "small + focused only"

barrel_exports:
    required: true
    rule: "index.ts defines public API only"

# =========================================================
# 7. PUBLIC API + ISOLATION MODEL
# =========================================================

public_api_model:
    rule: "ONLY index.ts exposes module surface"

module_isolation:
    allowed:
        - service-to-service via interfaces

    forbidden:
        - cross-module internal imports

# =========================================================
# 8. VALIDATION SYSTEM (COMBINED ENGINE)
# =========================================================

final_validation:
    must_pass:
        - architecture_rules.validation_checkpoints
        - architecture_contract_v3.validation
        - no_cross_layer_dependency_violation
        - single_intent_per_class
        - folder_purity
        - module_isolation

    failure_mode:
        - "fail_closed"
        - "regenerate from decomposition stage"

# =========================================================
# 9. HEURISTICS + CONTRACT ENFORCEMENT
# =========================================================

heuristics:
    stopping_condition:
        definition: "no file fits better elsewhere"

    ambiguity_policy: "fail_closed"

    enforcement_mode: "strict"

# =========================================================
# 10. OUTPUT MODEL
# =========================================================

output:
    required_sections:
        - feature_summary
        - decomposed_units
        - hierarchy_mapping
        - role_assignment_map
        - pattern_map
        - folder_structure_map
        - dependency_graph
        - validation_report

    graph_model:
        type: "directed_acyclic_graph"
